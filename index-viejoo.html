<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Item Collector Adventure</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Bungee&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  #game-container canvas {
    display: block;
    border: 3px solid #444;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
  }
</style>
</head>
<body>
<div id="game-container"></div>
<script>

const FONT_SCALE = 0.5;
const CANVAS_W = 800;
const CANVAS_H = 700;
const HUD_H    = 72;
const BOTTOM_H = 28;
const GAME_H   = CANVAS_H - HUD_H - BOTTOM_H;

const CELL   = 64;
const COLS   = Math.floor(CANVAS_W / CELL);
const ROWS   = Math.floor(GAME_H   / CELL);
const WALL_T = 5;

// ── Movement timing ──────────────────────────────────────────
// MOVE_COOLDOWN: frames between each move (prevents speed accumulation)
// HOLD_INITIAL_DELAY: frames before hold-repeat kicks in
// HOLD_REPEAT_INTERVAL: frames between repeat moves while held
const MOVE_COOLDOWN      = 10;  // ~167ms at 60fps — one move at a time
const HOLD_INITIAL_DELAY = 18;  // ~300ms before repeat starts
const HOLD_REPEAT_INTERVAL = 9; // ~150ms repeat rate while held

const LEVELS = [
  { bg: 'farm',       char: 1, items: 6, label: 'The Farm'       },
  { bg: 'highschool', char: 2, items: 7, label: 'High School'    },
  { bg: 'lab',        char: 3, items: 6, label: 'The Lab'        },
  { bg: 'office',     char: 4, items: 6, label: 'The Office'     },
  { bg: 'china',      char: 5, items: 7, label: 'China'          },
  { bg: 'nyc',        char: 6, items: 9, label: 'New York City', extra: true },
];

const BG_COLORS = [
  ['#7ec850','#5aaa32'],
  ['#f9e4b7','#e8c98a'],
  ['#cce8ff','#9ecfee'],
  ['#ddd5c8','#c0b49e'],
  ['#ff4444','#cc1111'],
  ['#1a1a2e','#16213e'],
];

const ITEM_COLORS = [
  '#f7c948','#e05c2e','#6ec1e4','#9ddc7a','#e87ea1','#b07cdb',
  '#f4e04d','#64d2a4','#ff9966',
];

const COCKTAIL_COLORS = ['#ff6b9d','#c44dff','#ffb347'];

const PATH = {
  bg:        n     => `background${n}.png`,
  char:      (n,d) => `character${n}${d}.png`,
  item:      (n,l) => `item${n}${l}.png`,
  apartment: ()    => `apartment.png`,
  cocktail:  n     => `cocktail${n}.png`,
  heart:     ()    => `heart.png`,
};

const rawImgs = {};

function startImagePreload() {
  function load(key, src) {
    rawImgs[key] = null;
    const el = new window.Image();
    el.onload  = () => { rawImgs[key] = el; };
    el.onerror = () => { rawImgs[key] = null; };
    el.src = src;
  }
  for (let lv = 1; lv <= 6; lv++) {
    load(`bg${lv}`, PATH.bg(lv));
    ['right','left','up','down'].forEach(d =>
      load(`char${lv}${d}`, PATH.char(lv, d))
    );
    for (let i = 0; i < 9; i++) {
      let l = String.fromCharCode(97 + i);
      load(`item${lv}${l}`, PATH.item(lv, l));
    }
  }
  load('apartment', PATH.apartment());
  load('cocktail1', PATH.cocktail(1));
  load('cocktail2', PATH.cocktail(2));
  load('cocktail3', PATH.cocktail(3));
  load('heart',     PATH.heart());
}

startImagePreload();

function drawRaw(p, key, x, y, w, h, alpha) {
  if (!rawImgs[key]) return false;
  try {
    if (alpha !== undefined && alpha < 1) {
      p.drawingContext.save();
      p.drawingContext.globalAlpha = alpha;
    }
    p.drawingContext.drawImage(rawImgs[key], x - w/2, y - h/2, w, h);
    if (alpha !== undefined && alpha < 1) {
      p.drawingContext.restore();
    }
    return true;
  } catch(e) { return false; }
}

new p5(function(p) {

  let state  = 'menu';
  let level  = 0;
  let maze, player, items, apartment, cocktails, lives, warningTimer;
  let phase6 = 'apartment';

  // ── Heart hit animation state ────────────────────────────────
  // When a life is lost: track which heart index was just lost,
  // its animation phase (pulse-big → blink-out), and a timer.
  let heartAnim = null; // { index, phase: 'pulse'|'blink', timer, size, alpha }

  // ── Key-hold tracking ────────────────────────────────────────
  // Tracks how long each direction key has been held (in frames).
  let keyHeld = { right: 0, left: 0, up: 0, down: 0 };
  // Cooldown prevents queuing up moves from rapid tapping
  let moveCooldown = 0;

  p.preload = function() {};

  p.setup = function() {
    let cnv = p.createCanvas(CANVAS_W, CANVAS_H);
    cnv.parent('game-container');
    p.imageMode(p.CENTER);
    p.textAlign(p.CENTER, p.CENTER);
    p.frameRate(60);
    p.textFont('Press Start 2P');
  };

  p.draw = function() {
    p.background(30);
    if      (state === 'menu')       drawMenu();
    else if (state === 'warning')    drawWarning();
    else if (state === 'playing')    drawPlaying();
    else if (state === 'levelClear') drawLevelClear();
    else if (state === 'gameOver')   drawGameOver();
    else if (state === 'win')        drawWin();
  };

  // ============================================================
  // MENU
  // ============================================================
  function drawMenu() {
    drawFancyBg(0);
    p.noStroke();

    p.textFont('Bungee');
    p.fill(255);
    p.textSize(48 * FONT_SCALE);
    p.text('ITEM COLLECTOR', CANVAS_W/2, CANVAS_H/2 - 110);

    p.textFont('Press Start 2P');
    p.fill(255);
    p.textSize(8 * FONT_SCALE);
    p.text('NAVIGATE THE LABYRINTH', CANVAS_W/2, CANVAS_H/2 - 58);
    p.text('COLLECT EVERY ITEM!',    CANVAS_W/2, CANVAS_H/2 - 36);

    p.fill(200, 230, 255);
    p.textSize(7 * FONT_SCALE);
    p.text('ARROW KEYS OR WASD TO MOVE', CANVAS_W/2, CANVAS_H/2 - 6);

    let pulse = Math.sin(p.frameCount * 0.05) * 6;
    p.fill(60, 180, 80);
    p.noStroke();
    p.rect(CANVAS_W/2 - 90 - pulse/2, CANVAS_H/2 + 48, 180 + pulse, 46, 6);
    p.fill(255);
    p.textFont('Press Start 2P');
    p.textSize(13 * FONT_SCALE);
    p.textStyle(p.BOLD);
    p.text('PLAY', CANVAS_W/2, CANVAS_H/2 + 71);
    p.textStyle(p.NORMAL);
  }

  // ============================================================
  // WARNING
  // ============================================================
  function drawWarning() {
    p.background(10);
    let alpha = Math.abs(Math.sin(p.frameCount * 0.08)) * 255;
    p.fill(255, 50, 50, alpha);
    p.noStroke();
    p.textSize(26 * FONT_SCALE);
    p.textStyle(p.BOLD);
    p.text('!! EXTRA HARD !!', CANVAS_W/2, CANVAS_H/2 - 60);
    p.fill(255, 200, 0);
    p.textSize(9 * FONT_SCALE);
    p.textStyle(p.NORMAL);
    p.text('NEW YORK CITY',               CANVAS_W/2, CANVAS_H/2 - 10);
    p.text('WATCH OUT FOR $25 COCKTAILS!',CANVAS_W/2, CANVAS_H/2 + 18);
    p.fill(180, 180, 255);
    p.textSize(7 * FONT_SCALE);
    p.text('CATCH THE APARTMENT FIRST', CANVAS_W/2, CANVAS_H/2 + 56);
    p.text('TO UNLOCK THE ITEMS',       CANVAS_W/2, CANVAS_H/2 + 74);
    warningTimer--;
    if (warningTimer <= 0) state = 'playing';
  }

  // ============================================================
  // PLAYING
  // ============================================================
  function drawPlaying() {
    drawFancyBg(level);
    drawMaze();

    if (level === 5 && phase6 === 'apartment') {
      updateApartment();
      drawApartment();
    }
    if (level < 5 || phase6 === 'items') drawItems();
    if (level === 5 && phase6 === 'items') {
      updateCocktails();
      drawCocktails();
      checkCocktailCollision();
    }

    updatePlayer();
    drawPlayer();
    checkItemCollection();
    drawHUD();

    let collected = items.filter(it => it.collected).length;
    if (items.length > 0 && collected === items.length) {
      state = level === LEVELS.length - 1 ? 'win' : 'levelClear';
    }
  }

  // ============================================================
  // LEVEL CLEAR
  // ============================================================
  function drawLevelClear() {
    drawFancyBg(level);
    p.fill(0,0,0,160); p.noStroke(); p.rect(0,0,CANVAS_W,CANVAS_H);
    p.fill(100,255,120); p.textSize(26 * FONT_SCALE); p.textStyle(p.BOLD);
    p.text('LEVEL CLEAR!', CANVAS_W/2, CANVAS_H/2-60);
    p.fill(255); p.textSize(8 * FONT_SCALE); p.textStyle(p.NORMAL);
    p.text(LEVELS[level].label.toUpperCase(), CANVAS_W/2, CANVAS_H/2-10);
    p.text('ALL ITEMS COLLECTED!',            CANVAS_W/2, CANVAS_H/2+14);
    p.fill(60,180,80);
    p.rect(CANVAS_W/2-100, CANVAS_H/2+56, 200, 46, 6);
    p.fill(255); p.textSize(10 * FONT_SCALE); p.textStyle(p.BOLD);
    p.text('NEXT LEVEL >', CANVAS_W/2, CANVAS_H/2+79);
    p.textStyle(p.NORMAL);
  }

  // ============================================================
  // GAME OVER
  // ============================================================
  function drawGameOver() {
    p.background(10);
    p.fill(255,50,50); p.textSize(30 * FONT_SCALE); p.textStyle(p.BOLD);
    p.text('GAME OVER', CANVAS_W/2, CANVAS_H/2-70);
    p.fill(255); p.textSize(8 * FONT_SCALE); p.textStyle(p.NORMAL);
    p.text('TOO MANY $25 COCKTAILS...', CANVAS_W/2, CANVAS_H/2-10);
    drawRestartButton(CANVAS_H/2+70);
  }

  // ============================================================
  // WIN
  // ============================================================
  function drawWin() {
    p.colorMode(p.HSB,360,100,100);
    p.background(p.frameCount%360,60,20);
    p.colorMode(p.RGB,255);
    p.fill(255,220,50); p.textSize(30 * FONT_SCALE); p.textStyle(p.BOLD);
    p.text('YOU WIN!', CANVAS_W/2, CANVAS_H/2-80);
    p.fill(255); p.textSize(9 * FONT_SCALE); p.textStyle(p.NORMAL);
    p.text('ALL 6 LEVELS CONQUERED!', CANVAS_W/2, CANVAS_H/2-20);
    drawRestartButton(CANVAS_H/2+70);
  }

  // ============================================================
  // BACKGROUND
  // ============================================================
  function drawFancyBg(lv) {
    let key = `bg${lv + 1}`;
    if (rawImgs[key]) {
      p.drawingContext.drawImage(rawImgs[key], 0, 0, CANVAS_W, CANVAS_H);
      return;
    }
    let [c1,c2] = BG_COLORS[lv] || ['#334','#223'];
    for (let y = 0; y < CANVAS_H; y += 2) {
      let rc = lerpColorHex(c1, c2, y/CANVAS_H);
      p.fill(rc[0],rc[1],rc[2]); p.noStroke(); p.rect(0,y,CANVAS_W,2);
    }
    if (lv===0) drawFarmOverlay();
    if (lv===1) drawSchoolOverlay();
    if (lv===2) drawLabOverlay();
    if (lv===3) drawOfficeOverlay();
    if (lv===4) drawChinaOverlay();
    if (lv===5) drawNYCOverlay();
  }

  function drawFarmOverlay() {
    p.noStroke();
    p.fill(255,220,50,120); p.ellipse(680,80,80,80);
    for (let x=0;x<CANVAS_W;x+=60) {
      p.fill(160,100,50,60);
      p.rect(x,GAME_H-30,10,30);
      p.rect(x-30,GAME_H-22,60,6,3);
    }
  }
  function drawSchoolOverlay() {
    p.fill(255,255,255,30); p.textSize(14 * FONT_SCALE);
    p.textAlign(p.LEFT); p.text('2 + 2 = 4\nABC...',30,HUD_H+40);
    p.textAlign(p.CENTER,p.CENTER);
  }
  function drawLabOverlay() {
    p.stroke(100,180,255,25); p.strokeWeight(1);
    for (let x=0;x<CANVAS_W;x+=50) p.line(x,HUD_H,x,CANVAS_H);
    for (let y=HUD_H;y<CANVAS_H;y+=50) p.line(0,y,CANVAS_W,y);
    p.noStroke();
  }
  function drawOfficeOverlay() {
    for (let col=0;col<4;col++) for (let row=0;row<3;row++) {
      p.fill(200,220,255,20);
      p.rect(col*200+10,HUD_H+row*120+20,160,80,4);
    }
  }
  function drawChinaOverlay() {
    p.fill(255,220,0,180);
    for (let i=0;i<5;i++) drawStar(650+i*20,90+(i%2)*20,8,4,5);
  }
  function drawNYCOverlay() {
    p.fill(20,20,40,200);
    let bs=[[0,80],[80,120],[140,60],[200,140],[280,90],[340,110],
            [400,80],[460,130],[520,70],[580,100],[640,90],[700,120],[760,80]];
    p.beginShape(); p.vertex(0,CANVAS_H);
    bs.forEach(([x,h])=>{p.vertex(x,CANVAS_H-h);p.vertex(x+60,CANVAS_H-h);});
    p.vertex(CANVAS_W,CANVAS_H); p.endShape(p.CLOSE);
    p.noStroke(); p.fill(255,255,200,160);
    for (let i=0;i<30;i++){
      let sx=(i*173)%CANVAS_W,sy=HUD_H+(i*97)%(GAME_H/2);
      let s=1+Math.sin(p.frameCount*0.02+i)*0.5;
      p.ellipse(sx,sy,s*3,s*3);
    }
  }

  // ============================================================
  // MAZE
  // ============================================================
  function buildMaze() {
    let walls=[],visited=[];
    for (let r=0;r<ROWS;r++){
      walls.push([]); visited.push([]);
      for (let c=0;c<COLS;c++){walls[r].push({right:true,down:true});visited[r].push(false);}
    }
    function carve(r,c){
      visited[r][c]=true;
      for (let d of shuffle([0,1,2,3])){
        let nr=r+[0,1,0,-1][d],nc=c+[1,0,-1,0][d];
        if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!visited[nr][nc]){
          if(d===0)walls[r][c].right=false;
          if(d===1)walls[r][c].down=false;
          if(d===2)walls[r][nc].right=false;
          if(d===3)walls[nr][c].down=false;
          carve(nr,nc);
        }
      }
    }
    carve(0,0);
    let extra=Math.floor(ROWS*COLS*0.30);
    for(let i=0;i<extra;i++){
      let r=Math.floor(Math.random()*ROWS),c=Math.floor(Math.random()*COLS);
      if(Math.random()<0.5&&c<COLS-1)walls[r][c].right=false;
      else if(r<ROWS-1)walls[r][c].down=false;
    }
    return walls;
  }

  function drawMaze() {
    p.stroke(80,80,100); p.strokeWeight(WALL_T); p.noFill();
    p.rect(0,HUD_H,CANVAS_W,GAME_H);
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      let x=c*CELL,y=HUD_H+r*CELL;
      if(maze[r][c].right&&c<COLS-1) p.line(x+CELL,y,x+CELL,y+CELL);
      if(maze[r][c].down&&r<ROWS-1)  p.line(x,y+CELL,x+CELL,y+CELL);
    }
    p.noStroke();
    p.fill(0); p.rect(0,CANVAS_H-BOTTOM_H,CANVAS_W,BOTTOM_H);
    p.fill(40,40,40); p.rect(0,CANVAS_H-BOTTOM_H,CANVAS_W,3);
    p.fill(70,70,70); p.rect(0,CANVAS_H-BOTTOM_H+3,CANVAS_W,2);
  }

  // ============================================================
  // PLAYER
  // ============================================================
  function initPlayer() {
    return {
      col:0, row:0,
      x:CELL/2, y:HUD_H+CELL/2,
      targetX:CELL/2, targetY:HUD_H+CELL/2,
      dir:'right', moving:false,
      // Invincibility/blink state after getting hit
      invincible: false,
      invincibleTimer: 0,  // total frames of invincibility
      blinkOn: true,
    };
  }

  // ── Teleport player back to start (on cocktail hit) ──────────
  function resetPlayerToStart() {
    player.col = 0;
    player.row = 0;
    player.x   = CELL/2;
    player.y   = HUD_H + CELL/2;
    player.targetX = CELL/2;
    player.targetY = HUD_H + CELL/2;
    player.moving  = false;
    player.invincible = true;
    player.invincibleTimer = 180; // 3 seconds of invincibility
    player.blinkOn = true;
    moveCooldown = 0;
    // Reset held keys so no phantom movement
    keyHeld = { right: 0, left: 0, up: 0, down: 0 };
  }

  // ── Key-hold based movement ──────────────────────────────────
  // Determines which direction to move and whether enough time has
  // passed (initial hold delay or repeat interval).
  function getMovementInput() {
    // Update held counters
    const dirs = {
      right: p.keyIsDown(p.RIGHT_ARROW) || p.keyIsDown(68),
      left:  p.keyIsDown(p.LEFT_ARROW)  || p.keyIsDown(65),
      down:  p.keyIsDown(p.DOWN_ARROW)  || p.keyIsDown(83),
      up:    p.keyIsDown(p.UP_ARROW)    || p.keyIsDown(87),
    };
    // Prioritise: right > left > down > up (first one found wins)
    const order = ['right','left','down','up'];
    let activeDir = null;
    for (let d of order) {
      if (dirs[d]) { activeDir = d; break; }
    }
    // Increment or reset each counter
    for (let d of order) {
      if (dirs[d] && activeDir === d) {
        keyHeld[d]++;
      } else {
        keyHeld[d] = 0;
      }
    }
    if (!activeDir) return null;

    let held = keyHeld[activeDir];
    // Allow a move on frame 1 (fresh tap), or after initial delay,
    // or on repeat interval — but only if moveCooldown is zero.
    let shouldMove =
      held === 1 ||
      (held >= HOLD_INITIAL_DELAY && (held - HOLD_INITIAL_DELAY) % HOLD_REPEAT_INTERVAL === 0);

    if (!shouldMove) return null;
    return activeDir;
  }

  function updatePlayer() {
    // Tick down the global move cooldown
    if (moveCooldown > 0) moveCooldown--;

    // Tick invincibility
    if (player.invincible) {
      player.invincibleTimer--;
      // Blink every 6 frames
      player.blinkOn = Math.floor(player.invincibleTimer / 6) % 2 === 0;
      if (player.invincibleTimer <= 0) {
        player.invincible = false;
        player.blinkOn    = true;
      }
    }

    if (!player.moving && moveCooldown === 0) {
      let dir = getMovementInput();
      if (dir) {
        let dc = dir==='right'?1 : dir==='left'?-1 : 0;
        let dr = dir==='down' ?1 : dir==='up'  ?-1 : 0;
        player.dir = dir;
        let nr = player.row + dr, nc = player.col + dc;
        if (canMove(player.row, player.col, nr, nc)) {
          player.row = nr; player.col = nc;
          player.targetX = nc * CELL + CELL/2;
          player.targetY = HUD_H + nr * CELL + CELL/2;
          player.moving  = true;
          moveCooldown   = MOVE_COOLDOWN;
        }
      }
    } else if (player.moving) {
      player.x = lerp(player.x, player.targetX, 0.25);
      player.y = lerp(player.y, player.targetY, 0.25);
      if (Math.abs(player.x - player.targetX) < 0.5 &&
          Math.abs(player.y - player.targetY) < 0.5) {
        player.x = player.targetX;
        player.y = player.targetY;
        player.moving = false;
      }
    }
  }

  function drawPlayer() {
    // During invincibility, skip drawing on blink-off frames
    if (player.invincible && !player.blinkOn) return;

    let lv  = LEVELS[level].char;
    let key = `char${lv}${player.dir}`;
    let sz  = CELL - 4;
    let alpha = player.invincible ? 0.6 : 1.0; // slightly transparent while invincible

    if (!drawRaw(p, key, player.x, player.y, sz, sz, alpha)) {
      drawCharFallback(player.x, player.y, sz, player.dir, level, alpha);
    }
  }

  function drawCharFallback(x, y, sz, dir, lv, alpha) {
    let cols=['#f7c948','#64d2a4','#6ec1e4','#e87ea1','#ff9966','#b07cdb'];
    let c=cols[lv%cols.length];
    let r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
    let a = Math.round((alpha !== undefined ? alpha : 1) * 255);
    p.fill(r,g,b,a);
    p.noStroke(); p.ellipse(x,y,sz*0.85,sz*0.85);
    let ex=dir==='left'?-1:dir==='right'?1:0;
    let ey=dir==='up'?-1:dir==='down'?1:0;
    p.fill(30,30,30,a);
    p.ellipse(x+ex*4-3,y+ey*4-3,5,5);
    p.ellipse(x+ex*4+3,y+ey*4-3,5,5);
  }

  // ============================================================
  // MOVEMENT
  // ============================================================
  function canMove(r,c,nr,nc){
    if(nr<0||nr>=ROWS||nc<0||nc>=COLS)return false;
    let dc=nc-c,dr=nr-r;
    if(dc=== 1)return !maze[r][c].right;
    if(dc===-1)return !maze[r][nc].right;
    if(dr=== 1)return !maze[r][c].down;
    if(dr===-1)return !maze[nr][c].down;
    return false;
  }

  // ============================================================
  // ITEMS
  // ============================================================
  function initItems(){
    return shuffledCells().slice(0,LEVELS[level].items).map(([r,c],i)=>({
      row:r,col:c,x:c*CELL+CELL/2,y:HUD_H+r*CELL+CELL/2,
      collected:false,bounce:Math.random()*Math.PI*2,index:i,
    }));
  }

  function drawItems(){
    let lv=LEVELS[level].char;
    items.forEach((it,i)=>{
      if(it.collected)return;
      let bob=Math.sin(p.frameCount*0.05+it.bounce)*3;
      let key=`item${lv}${String.fromCharCode(97+i)}`,sz=CELL-8;
      if(!drawRaw(p,key,it.x,it.y+bob,sz,sz)){
        let col=ITEM_COLORS[i%ITEM_COLORS.length];
        p.fill(parseInt(col.slice(1,3),16),parseInt(col.slice(3,5),16),parseInt(col.slice(5,7),16));
        p.noStroke(); p.rect(it.x-sz/2,it.y+bob-sz/2,sz,sz,4);
        p.fill(255,255,255,180); p.textSize(12 * FONT_SCALE);
        p.text(String.fromCharCode(65+i),it.x,it.y+bob);
      }
    });
  }

  function checkItemCollection(){
    items.forEach(it=>{
      if(!it.collected&&it.row===player.row&&it.col===player.col)it.collected=true;
    });
  }

  // ============================================================
  // APARTMENT
  // ============================================================
  function initApartment(){
    let [r,c]=shuffledCells().find(([r,c])=>
      Math.abs(r-player.row)+Math.abs(c-player.col)>5
    )||[ROWS-1,COLS-1];
    return{row:r,col:c,x:c*CELL+CELL/2,y:HUD_H+r*CELL+CELL/2,
           targetX:c*CELL+CELL/2,targetY:HUD_H+r*CELL+CELL/2,timer:0,moveInterval:22};
  }

  function updateApartment(){
    apartment.timer++;
    if(apartment.timer>=apartment.moveInterval){
      apartment.timer=0;
      for(let[dr,dc]of shuffle([[0,1],[0,-1],[1,0],[-1,0]])){
        let nr=apartment.row+dr,nc=apartment.col+dc;
        if(canMove(apartment.row,apartment.col,nr,nc)){
          apartment.row=nr;apartment.col=nc;
          apartment.targetX=nc*CELL+CELL/2;
          apartment.targetY=HUD_H+nr*CELL+CELL/2;
          break;
        }
      }
    }
    apartment.x=lerp(apartment.x,apartment.targetX,0.15);
    apartment.y=lerp(apartment.y,apartment.targetY,0.15);
    if(apartment.row===player.row&&apartment.col===player.col){
      phase6='items';items=initItems();initCocktails();
    }
  }

  function drawApartment(){
    let bob=Math.sin(p.frameCount*0.06)*4,sz=CELL-4;
    if(!drawRaw(p,'apartment',apartment.x,apartment.y+bob,sz,sz)){
      p.fill(200,160,100);p.noStroke();
      p.rect(apartment.x-sz/2,apartment.y+bob-sz/2,sz,sz,4);
      p.fill(60,100,160);
      p.rect(apartment.x-sz/4,apartment.y+bob-sz/4,sz/2,sz/2,2);
      p.fill(255);p.textSize(10 * FONT_SCALE);p.text('APT',apartment.x,apartment.y+bob);
    }
    p.fill(255,220,50);p.noStroke();p.textSize(7 * FONT_SCALE);
    p.text('CATCH ME!',apartment.x,apartment.y-CELL/2-4);
  }

  // ============================================================
  // COCKTAILS
  // ============================================================
  function initCocktails(){
    cocktails=[0,1,2].map(i=>{
      let[r,c]=shuffledCells().find(([r,c])=>
        Math.abs(r-player.row)+Math.abs(c-player.col)>4
      )||[ROWS-1,COLS-1];
      return{row:r,col:c,x:c*CELL+CELL/2,y:HUD_H+r*CELL+CELL/2,
             targetX:c*CELL+CELL/2,targetY:HUD_H+r*CELL+CELL/2,
             timer:0,moveInterval:35+i*10,
             imgKey:`cocktail${i+1}`,color:COCKTAIL_COLORS[i],hitCooldown:0};
    });
  }

  function updateCocktails(){
    cocktails.forEach(ck=>{
      ck.hitCooldown=Math.max(0,ck.hitCooldown-1);
      ck.timer++;
      if(ck.timer>=ck.moveInterval){
        ck.timer=0;
        let best=null,bestDist=Infinity;
        for(let[dr,dc]of shuffle([[0,1],[0,-1],[1,0],[-1,0]])){
          let nr=ck.row+dr,nc=ck.col+dc;
          if(canMove(ck.row,ck.col,nr,nc)){
            let d=Math.abs(nr-player.row)+Math.abs(nc-player.col);
            if(d<bestDist){bestDist=d;best=[nr,nc];}
          }
        }
        if(best){[ck.row,ck.col]=best;ck.targetX=ck.col*CELL+CELL/2;ck.targetY=HUD_H+ck.row*CELL+CELL/2;}
      }
      ck.x=lerp(ck.x,ck.targetX,0.15);
      ck.y=lerp(ck.y,ck.targetY,0.15);
    });
  }

  function drawCocktails(){
    cocktails.forEach(ck=>{
      let bob=Math.sin(p.frameCount*0.07+ck.timer)*3,sz=CELL-6;
      if(!drawRaw(p,ck.imgKey,ck.x,ck.y+bob,sz,sz)){
        let c=ck.color;
        p.fill(parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16));
        p.noStroke();p.ellipse(ck.x,ck.y+bob,sz,sz);
        p.fill(255);p.textSize(11 * FONT_SCALE);p.text('$25',ck.x,ck.y+bob);
      }
    });
  }

  function checkCocktailCollision(){
    if (player.invincible) return; // immune during blink period
    cocktails.forEach(ck=>{
      if(ck.hitCooldown>0)return;
      if(ck.row===player.row&&ck.col===player.col){
        lives--;
        ck.hitCooldown = 180;

        // Trigger heart animation for the heart we just lost
        heartAnim = {
          index: lives,        // lives already decremented — this is the lost heart
          timer: 0,
          phase: 'pulse',      // phase 1: grow big
          pulseDuration: 30,   // frames for pulse
          blinkDuration: 60,   // frames for blink-out
        };

        // Teleport player back to start and make them invincible
        resetPlayerToStart();

        if(lives<=0) {
          // Small delay before game over so animation shows
          setTimeout(() => { state='gameOver'; }, 500);
        }
      }
    });
  }

  // ============================================================
  // HUD  (with heart animation)
  // ============================================================
  function drawHUD(){
    p.fill(15,15,25);p.noStroke();p.rect(0,0,CANVAS_W,HUD_H);
    p.fill(255,255,255,8);
    for(let y=0;y<HUD_H;y+=4)p.rect(0,y,CANVAS_W,2);

    p.fill(255,220,80);p.noStroke();p.textSize(8 * FONT_SCALE);
    p.textAlign(p.LEFT,p.CENTER);
    p.text(`LVL ${level+1}`,10,HUD_H/2-8);
    p.fill(200,200,255);p.textSize(7 * FONT_SCALE);
    p.text(LEVELS[level].label.toUpperCase(),10,HUD_H/2+8);

    let showBar=!(level===5&&phase6==='apartment');
    if(showBar){
      let collected=items.filter(it=>it.collected).length,total=items.length;
      let barW=200,barH=14,barX=CANVAS_W/2-barW/2,barY=HUD_H/2+8;
      p.textAlign(p.CENTER,p.CENTER);p.fill(180,230,255);p.textSize(7 * FONT_SCALE);
      p.text(`ITEMS: ${collected}/${total}`,CANVAS_W/2,barY-10);
      p.fill(60,60,80);p.rect(barX-2,barY-2,barW+4,barH+4);
      p.fill(20,20,35);p.rect(barX,barY,barW,barH);
      let segW=Math.floor(barW/total)-1;
      for(let i=0;i<total;i++){
        let sx=barX+i*(segW+2);
        if(i<collected){p.fill(80,220,120);p.rect(sx,barY,segW,barH);p.fill(160,255,180);p.rect(sx,barY,segW,3);}
        else{p.fill(40,40,60);p.rect(sx,barY,segW,barH);p.fill(50,50,75);p.rect(sx,barY,segW,2);}
      }
    }

    if(level===5){
      p.fill(255,180,50);p.textSize(6 * FONT_SCALE);p.textAlign(p.CENTER,p.CENTER);
      let hintY=showBar?(HUD_H/2+8+14+8):HUD_H/2;
      p.text(phase6==='apartment'?'> FIND THE APARTMENT <':'> DODGE THE $25 COCKTAILS <',CANVAS_W/2,hintY);

      // Draw hearts with animation support
      let baseSize  = 18;
      let startX    = CANVAS_W - 14;
      let heartY    = HUD_H/2;

      // Tick the animation
      if (heartAnim) heartAnim.timer++;

      for (let i = 0; i < 3; i++) {
        let hx  = startX - i * (baseSize + 4);
        let sz  = baseSize;
        let heartAlpha = 1.0;
        let isAnimatingHeart = heartAnim && heartAnim.index === i;

        if (isAnimatingHeart) {
          let t = heartAnim.timer;
          if (heartAnim.phase === 'pulse') {
            // Grow from 1x to 1.8x then back, over pulseDuration frames
            let progress = t / heartAnim.pulseDuration;
            let scale = 1 + 0.8 * Math.sin(progress * Math.PI);
            sz = baseSize * scale;
            if (t >= heartAnim.pulseDuration) {
              heartAnim.phase = 'blink';
              heartAnim.timer = 0;
            }
          } else if (heartAnim.phase === 'blink') {
            let t2 = heartAnim.timer;
            // Blink: alternate every 6 frames, fade alpha out
            let blinkVis = Math.floor(t2 / 6) % 2 === 0;
            heartAlpha = blinkVis ? Math.max(0, 1 - t2 / heartAnim.blinkDuration) : 0;
            if (t2 >= heartAnim.blinkDuration) {
              heartAnim = null; // animation done
              heartAlpha = 0;
              sz = 0; // fully gone — don't draw
            }
          }
        }

        // Only draw this heart if it's still "alive" or being animated
        let isAlive = i < lives;
        if (!isAlive && !isAnimatingHeart) continue;
        if (sz <= 0) continue;

        // Filled heart = alive or animating; empty = lost (not animating)
        let isFilledHeart = isAlive || isAnimatingHeart;

        p.drawingContext.save();
        p.drawingContext.globalAlpha = heartAlpha;
        if (rawImgs['heart'] && isFilledHeart) {
          p.drawingContext.drawImage(rawImgs['heart'], hx - sz/2, heartY - sz/2, sz, sz);
        } else {
          p.fill(isFilledHeart ? p.color(232,25,44) : p.color(60,60,80));
          p.noStroke();
          drawHeartShape(hx, heartY, sz);
        }
        p.drawingContext.restore();
      }
    }
    p.textAlign(p.CENTER,p.CENTER);
  }

  function drawHeartShape(x,y,sz){
    let s=sz/20;p.beginShape();
    p.vertex(x,y+4*s);
    p.bezierVertex(x-10*s,y-4*s,x-20*s,y+2*s,x,y+14*s);
    p.bezierVertex(x+20*s,y+2*s,x+10*s,y-4*s,x,y+4*s);
    p.endShape(p.CLOSE);
  }

  // ============================================================
  // MOUSE
  // ============================================================
  p.mousePressed = function(){
    let mx=p.mouseX,my=p.mouseY;
    if(state==='menu'){
      if(my>CANVAS_H/2+48&&my<CANVAS_H/2+94&&mx>CANVAS_W/2-100&&mx<CANVAS_W/2+100)
        startLevel(0);
    }
    if(state==='levelClear'){
      if(my>CANVAS_H/2+56&&my<CANVAS_H/2+102&&mx>CANVAS_W/2-100&&mx<CANVAS_W/2+100)
        startLevel(level+1);
    }
    if(state==='gameOver'||state==='win'){
      if(my>CANVAS_H/2+48&&my<CANVAS_H/2+92&&mx>CANVAS_W/2-100&&mx<CANVAS_W/2+100)
        {level=0;state='menu';}
    }
  };

  // ============================================================
  // START LEVEL
  // ============================================================
  function startLevel(lv){
    level=lv;maze=buildMaze();player=initPlayer();
    items=initItems();lives=3;phase6='apartment';
    heartAnim=null;
    keyHeld = { right:0, left:0, up:0, down:0 };
    moveCooldown=0;
    if(LEVELS[lv].extra){
      warningTimer=180;state='warning';
      apartment=initApartment();items=[];
    } else {
      state='playing';
    }
  }

  // ============================================================
  // UTILS
  // ============================================================
  function shuffledCells(){
    let cells=[];
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++)
      if(!(r===0&&c===0))cells.push([r,c]);
    return shuffle(cells);
  }
  function shuffle(arr){
    let a=[...arr];
    for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
    return a;
  }
  function lerp(a,b,t){return a+(b-a)*t;}
  function lerpColorHex(h1,h2,t){
    let parse=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
    let[r1,g1,b1]=parse(h1),[r2,g2,b2]=parse(h2);
    return[Math.round(r1+(r2-r1)*t),Math.round(g1+(g2-g1)*t),Math.round(b1+(b2-b1)*t)];
  }
  function drawStar(x,y,r1,r2,pts){
    p.beginShape();
    for(let i=0;i<pts*2;i++){
      let a=(Math.PI/pts)*i-Math.PI/2,r=i%2===0?r1:r2;
      p.vertex(x+Math.cos(a)*r,y+Math.sin(a)*r);
    }
    p.endShape(p.CLOSE);
  }
  function drawRestartButton(y){
    p.fill(60,60,180);p.noStroke();
    p.rect(CANVAS_W/2-100,y-22,200,44,6);
    p.fill(255);p.textSize(10 * FONT_SCALE);p.textStyle(p.BOLD);
    p.text('PLAY AGAIN',CANVAS_W/2,y);
    p.textStyle(p.NORMAL);
  }

}); // end p5
</script>
