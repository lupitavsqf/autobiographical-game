<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Item Collector Adventure</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Bungee&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
  }
  #game-container canvas {
    display: block;
    border: 3px solid #444;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
  }
</style>
</head>
<body>
<div id="game-container"></div>
<script>
// ============================================================
//  ITEM COLLECTOR ADVENTURE  —  Full 6-Level p5.js Game
// ============================================================

const CANVAS_W = 800;
const CANVAS_H = 700;
const HUD_H    = 72;        // top HUD bar height
const BOTTOM_H = 28;        // black border at bottom (inaccessible)
const GAME_H   = CANVAS_H - HUD_H - BOTTOM_H;  // playfield height

// ── Maze constants ──────────────────────────────────────────
const CELL   = 64;   // px per maze cell — larger = fewer, more open corridors
const COLS   = Math.floor(CANVAS_W / CELL);  // ~12
const ROWS   = Math.floor(GAME_H   / CELL);  // ~10
const WALL_T = 5;    // wall thickness

// ── Level definitions ───────────────────────────────────────
const LEVELS = [
  { bg: 'farm',       char: 1, items: 6, label: 'The Farm'        },
  { bg: 'highschool', char: 2, items: 7, label: 'High School'     },
  { bg: 'lab',        char: 3, items: 6, label: 'The Lab'         },
  { bg: 'office',     char: 4, items: 6, label: 'The Office'      },
  { bg: 'china',      char: 5, items: 7, label: 'China'           },
  { bg: 'nyc',        char: 6, items: 9, label: 'New York City',  extra: true },
];

// ── BG palette fallbacks (drawn when images are missing) ────
const BG_COLORS = [
  ['#7ec850','#5aaa32'],  // farm   – grassy greens
  ['#f9e4b7','#e8c98a'],  // school – warm cream
  ['#cce8ff','#9ecfee'],  // lab    – cool blue-white
  ['#ddd5c8','#c0b49e'],  // office – beige
  ['#ff4444','#cc1111'],  // china  – red
  ['#1a1a2e','#16213e'],  // nyc    – night sky
];

// ── Item colour fallbacks (per level palette) ────────────────
const ITEM_COLORS = [
  '#f7c948','#e05c2e','#6ec1e4','#9ddc7a','#e87ea1','#b07cdb',
  '#f4e04d','#64d2a4','#ff9966',
];

// ── Cocktail colours for level 6 ────────────────────────────
const COCKTAIL_COLORS = ['#ff6b9d','#c44dff','#ffb347'];

// ============================================================
new p5(function(p) {

  // ── State ──────────────────────────────────────────────────
  let state  = 'menu';   // menu | warning | playing | levelClear | gameOver | win
  let level  = 0;
  let maze, player, items, apartment, cocktails, lives, warningTimer;
  let phase6 = 'apartment'; // 'apartment' | 'items'  (level-6 sub-phase)

  // Images (loaded lazily, missing = null)
  const imgs = {};

  // ── p5 preload: try loading all images; catch failures ──────
  p.preload = function() {
    const tryLoad = (key, path) => {
      try {
        imgs[key] = p.loadImage(path,
          () => {},                            // success – keep
          () => { imgs[key] = null; }          // failure – mark missing
        );
      } catch(e) { imgs[key] = null; }
    };

    for (let lv = 1; lv <= 6; lv++) {
      ['right','left','up','down'].forEach(d =>
        tryLoad(`char${lv}${d}`, `character${lv}${d}.png`));
      for (let i = 0; i < 9; i++)
        tryLoad(`item${lv}${String.fromCharCode(97+i)}`,
                `item${lv}${String.fromCharCode(97+i)}.png`);
    }
    tryLoad('apartment',  'apartment.png');
    tryLoad('cocktail1',  'cocktail1.png');
    tryLoad('cocktail2',  'cocktail2.png');
    tryLoad('cocktail3',  'cocktail3.png');
    tryLoad('heart',      'heart.png');
    for (let lv = 1; lv <= 6; lv++)
      tryLoad(`bg${lv}`, `background${lv}.png`);
  };

  // ── p5 setup ───────────────────────────────────────────────
  p.setup = function() {
    let cnv = p.createCanvas(CANVAS_W, CANVAS_H);
    cnv.parent('game-container');
    p.imageMode(p.CENTER);
    p.textAlign(p.CENTER, p.CENTER);
    p.frameRate(60);
    p.textFont('Press Start 2P');
  };

  // ── p5 draw ────────────────────────────────────────────────
  p.draw = function() {
    p.background(30);

    if      (state === 'menu')       drawMenu();
    else if (state === 'warning')    drawWarning();
    else if (state === 'playing')    drawPlaying();
    else if (state === 'levelClear') drawLevelClear();
    else if (state === 'gameOver')   drawGameOver();
    else if (state === 'win')        drawWin();
  };

  // ============================================================
  // MENU
  // ============================================================
  function drawMenu() {
    drawFancyBg(0);
    p.noStroke();
    // Title in Bungee
    p.textFont('Bungee');
    p.fill(255);
    p.textSize(52);
    p.text('ITEM COLLECTOR', CANVAS_W/2, CANVAS_H/2 - 80);

    // Rest in Press Start 2P
    p.textFont('Press Start 2P');
    p.textSize(10);
    p.fill(255);
    p.text('NAVIGATE THE LABYRINTH', CANVAS_W/2, CANVAS_H/2 - 30);
    p.text('COLLECT EVERY ITEM!', CANVAS_W/2, CANVAS_H/2 - 10);
    p.textSize(9);
    p.fill(200,230,255);
    p.text('ARROW KEYS OR WASD TO MOVE', CANVAS_W/2, CANVAS_H/2 + 30);

    // Animated start button
    let pulse = Math.sin(p.frameCount * 0.05) * 6;
    p.fill(60, 180, 80);
    p.noStroke();
    p.rect(CANVAS_W/2 - 90 - pulse/2, CANVAS_H/2 + 70, 180 + pulse, 44, 4);
    p.fill(255);
    p.textSize(14);
    p.textStyle(p.BOLD);
    p.text('PLAY', CANVAS_W/2, CANVAS_H/2 + 92);
    p.textStyle(p.NORMAL);
  }

  // ============================================================
  // WARNING (level 6)
  // ============================================================
  function drawWarning() {
    p.background(10);
    let alpha = Math.abs(Math.sin(p.frameCount * 0.08)) * 255;
    p.fill(255, 50, 50, alpha);
    p.noStroke();
    p.textSize(28);
    p.textStyle(p.BOLD);
    p.text('!! EXTRA HARD !!', CANVAS_W/2, CANVAS_H/2 - 60);
    p.fill(255, 200, 0);
    p.textSize(10);
    p.textStyle(p.NORMAL);
    p.text('NEW YORK CITY', CANVAS_W/2, CANVAS_H/2 - 10);
    p.text('WATCH OUT FOR $25 COCKTAILS!', CANVAS_W/2, CANVAS_H/2 + 20);
    p.fill(180, 180, 255);
    p.textSize(8);
    p.text('CATCH THE APARTMENT FIRST', CANVAS_W/2, CANVAS_H/2 + 60);
    p.text('TO UNLOCK THE ITEMS', CANVAS_W/2, CANVAS_H/2 + 78);

    warningTimer--;
    if (warningTimer <= 0) state = 'playing';
  }

  // ============================================================
  // PLAYING
  // ============================================================
  function drawPlaying() {
    // ── background ──
    let lv = LEVELS[level];
    drawFancyBg(level);

    // ── maze ──
    drawMaze();

    // ── apartment (level 6, phase 1) ──
    if (level === 5 && phase6 === 'apartment') {
      updateApartment();
      drawApartment();
    }

    // ── items (level 6 phase 2, or all other levels) ──
    if (level < 5 || phase6 === 'items') {
      drawItems();
    }

    // ── cocktails (level 6 only) ──
    if (level === 5 && phase6 === 'items') {
      updateCocktails();
      drawCocktails();
      checkCocktailCollision();
    }

    // ── player ──
    updatePlayer();
    drawPlayer();

    // ── collisions ──
    checkItemCollection();

    // ── HUD ──
    drawHUD();

    // ── win-level check ──
    let collectedCount = items.filter(it => it.collected).length;
    if (items.length > 0 && collectedCount === items.length) {
      if (level === LEVELS.length - 1) state = 'win';
      else state = 'levelClear';
    }
  }

  // ============================================================
  // LEVEL CLEAR
  // ============================================================
  function drawLevelClear() {
    drawFancyBg(level);
    p.fill(0, 0, 0, 160);
    p.noStroke();
    p.rect(0, 0, CANVAS_W, CANVAS_H);

    p.fill(100, 255, 120);
    p.textSize(28);
    p.textStyle(p.BOLD);
    p.text('LEVEL CLEAR!', CANVAS_W/2, CANVAS_H/2 - 60);

    p.fill(255);
    p.textSize(9);
    p.textStyle(p.NORMAL);
    p.text(LEVELS[level].label.toUpperCase(), CANVAS_W/2, CANVAS_H/2 - 10);
    p.text('ALL ITEMS COLLECTED!', CANVAS_W/2, CANVAS_H/2 + 14);

    p.fill(60, 180, 80);
    p.rect(CANVAS_W/2 - 100, CANVAS_H/2 + 60, 200, 44, 4);
    p.fill(255);
    p.textSize(11);
    p.textStyle(p.BOLD);
    p.text('NEXT LEVEL >', CANVAS_W/2, CANVAS_H/2 + 82);
    p.textStyle(p.NORMAL);
  }

  // ============================================================
  // GAME OVER (level 6 lives exhausted)
  // ============================================================
  function drawGameOver() {
    p.background(10);
    p.fill(255, 50, 50);
    p.textSize(32);
    p.textStyle(p.BOLD);
    p.text('GAME OVER', CANVAS_W/2, CANVAS_H/2 - 70);
    p.fill(255);
    p.textSize(9);
    p.textStyle(p.NORMAL);
    p.text('TOO MANY $25 COCKTAILS...', CANVAS_W/2, CANVAS_H/2 - 10);
    drawRestartButton(CANVAS_H/2 + 70);
  }

  // ============================================================
  // WIN
  // ============================================================
  function drawWin() {
    p.colorMode(p.HSB, 360, 100, 100);
    p.background(p.frameCount % 360, 60, 20);
    p.colorMode(p.RGB, 255);

    p.fill(255, 220, 50);
    p.textSize(32);
    p.textStyle(p.BOLD);
    p.text('YOU WIN!', CANVAS_W/2, CANVAS_H/2 - 80);
    p.fill(255);
    p.textSize(10);
    p.textStyle(p.NORMAL);
    p.text('ALL 6 LEVELS CONQUERED!', CANVAS_W/2, CANVAS_H/2 - 20);
    drawRestartButton(CANVAS_H/2 + 70);
  }

  // ============================================================
  // BACKGROUND DRAWING
  // ============================================================
  function drawFancyBg(lv) {
    let bgKey = `bg${lv + 1}`;
    if (imgs[bgKey]) {
      // Use the background image, stretched to fill canvas
      p.imageMode(p.CORNER);
      p.image(imgs[bgKey], 0, 0, CANVAS_W, CANVAS_H);
      p.imageMode(p.CENTER);
      return;
    }

    // Fallback: gradient + overlay
    let [c1, c2] = BG_COLORS[lv] || ['#334','#223'];
    for (let y = 0; y < CANVAS_H; y += 2) {
      let t = y / CANVAS_H;
      let rc = lerpColorHex(c1, c2, t);
      p.fill(rc[0], rc[1], rc[2]);
      p.noStroke();
      p.rect(0, y, CANVAS_W, 2);
    }

    // Decorative thematic overlays
    if (lv === 0) drawFarmOverlay();
    if (lv === 1) drawSchoolOverlay();
    if (lv === 2) drawLabOverlay();
    if (lv === 3) drawOfficeOverlay();
    if (lv === 4) drawChinaOverlay();
    if (lv === 5) drawNYCOverlay();
  }

  function drawFarmOverlay() {
    // Sun
    p.noStroke();
    p.fill(255, 220, 50, 120);
    p.ellipse(680, 80, 80, 80);
    // Fence posts suggestion
    for (let x = 0; x < CANVAS_W; x += 60) {
      p.fill(160, 100, 50, 60);
      p.rect(x, GAME_H - 30, 10, 30);
      p.rect(x-30, GAME_H - 22, 60, 6, 3);
    }
  }

  function drawSchoolOverlay() {
    // Faint chalkboard text only — no rectangle
    p.fill(255, 255, 255, 30);
    p.textSize(14);
    p.textAlign(p.LEFT);
    p.text('2 + 2 = 4\nABC...', 30, HUD_H + 40);
    p.textAlign(p.CENTER, p.CENTER);
  }

  function drawLabOverlay() {
    // Subtle grid lines
    p.stroke(100, 180, 255, 25);
    p.strokeWeight(1);
    for (let x = 0; x < CANVAS_W; x += 50)
      p.line(x, HUD_H, x, CANVAS_H);
    for (let y = HUD_H; y < CANVAS_H; y += 50)
      p.line(0, y, CANVAS_W, y);
    p.noStroke();
  }

  function drawOfficeOverlay() {
    // Faint windows
    for (let col = 0; col < 4; col++) {
      for (let row = 0; row < 3; row++) {
        p.fill(200, 220, 255, 20);
        p.rect(col * 200 + 10, HUD_H + row * 120 + 20, 160, 80, 4);
      }
    }
  }

  function drawChinaOverlay() {
    // Stars
    p.fill(255, 220, 0, 180);
    for (let i = 0; i < 5; i++) {
      drawStar(650 + i * 20, 90 + (i % 2) * 20, 8, 4, 5);
    }
  }

  function drawNYCOverlay() {
    // Skyline silhouette at bottom
    p.fill(20, 20, 40, 200);
    let buildings = [
      [0,80],[80,120],[140,60],[200,140],[280,90],[340,110],
      [400,80],[460,130],[520,70],[580,100],[640,90],[700,120],[760,80]
    ];
    p.beginShape();
    p.vertex(0, CANVAS_H);
    buildings.forEach(([x,h]) => {
      p.vertex(x, CANVAS_H - h);
      p.vertex(x + 60, CANVAS_H - h);
    });
    p.vertex(CANVAS_W, CANVAS_H);
    p.endShape(p.CLOSE);

    // Stars
    p.noStroke();
    p.fill(255, 255, 200, 160);
    for (let i = 0; i < 30; i++) {
      let sx = (i * 173) % CANVAS_W;
      let sy = HUD_H + (i * 97) % (GAME_H / 2);
      let s  = 1 + Math.sin(p.frameCount * 0.02 + i) * 0.5;
      p.ellipse(sx, sy, s * 3, s * 3);
    }
  }

  // ============================================================
  // MAZE  (recursive backtracker)
  // ============================================================
  function buildMaze() {
    // grid of cells: walls[row][col] = {right, down}
    let walls = [];
    let visited = [];
    for (let r = 0; r < ROWS; r++) {
      walls.push([]);
      visited.push([]);
      for (let c = 0; c < COLS; c++) {
        walls[r].push({ right: true, down: true });
        visited[r].push(false);
      }
    }

    function carve(r, c) {
      visited[r][c] = true;
      let dirs = shuffle([0,1,2,3]);
      for (let d of dirs) {
        let nr = r + [0,1,0,-1][d];
        let nc = c + [1,0,-1,0][d];
        if (nr>=0 && nr<ROWS && nc>=0 && nc<COLS && !visited[nr][nc]) {
          if (d===0) walls[r][c].right  = false;
          if (d===1) walls[r][c].down   = false;
          if (d===2) walls[r][nc].right = false;
          if (d===3) walls[nr][c].down  = false;
          carve(nr, nc);
        }
      }
    }
    carve(0, 0);

    // Extra openings: remove ~30% of remaining walls so the maze feels roomy
    let extra = Math.floor(ROWS * COLS * 0.30);
    for (let i = 0; i < extra; i++) {
      let r = Math.floor(Math.random() * ROWS);
      let c = Math.floor(Math.random() * COLS);
      if (Math.random() < 0.5 && c < COLS - 1) walls[r][c].right = false;
      else if (r < ROWS - 1)                    walls[r][c].down  = false;
    }

    return walls;
  }

  function drawMaze() {
    p.stroke(80, 80, 100);
    p.strokeWeight(WALL_T);

    // outer border
    p.noFill();
    p.rect(0, HUD_H, CANVAS_W, GAME_H);

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        let x = c * CELL;
        let y = HUD_H + r * CELL;
        if (maze[r][c].right && c < COLS - 1)
          p.line(x + CELL, y, x + CELL, y + CELL);
        if (maze[r][c].down  && r < ROWS - 1)
          p.line(x, y + CELL, x + CELL, y + CELL);
      }
    }
    p.noStroke();

    // Black bottom border — inaccessible strip
    p.fill(0);
    p.noStroke();
    p.rect(0, CANVAS_H - BOTTOM_H, CANVAS_W, BOTTOM_H);
    // Pixel-art decorative top edge of border
    p.fill(40, 40, 40);
    p.rect(0, CANVAS_H - BOTTOM_H, CANVAS_W, 3);
    p.fill(70, 70, 70);
    p.rect(0, CANVAS_H - BOTTOM_H + 3, CANVAS_W, 2);
  }

  // ============================================================
  // PLAYER
  // ============================================================
  function initPlayer() {
    return {
      col: 0, row: 0,
      x: CELL / 2, y: HUD_H + CELL / 2,
      targetX: CELL / 2, targetY: HUD_H + CELL / 2,
      speed: 4,
      dir: 'right',
      moving: false,
    };
  }

  function updatePlayer() {
    if (!player.moving) {
      let dc = 0, dr = 0, dir = player.dir;
      if      (p.keyIsDown(p.RIGHT_ARROW) || p.keyIsDown(68)) { dc=1;  dir='right'; }
      else if (p.keyIsDown(p.LEFT_ARROW)  || p.keyIsDown(65)) { dc=-1; dir='left';  }
      else if (p.keyIsDown(p.DOWN_ARROW)  || p.keyIsDown(83)) { dr=1;  dir='down';  }
      else if (p.keyIsDown(p.UP_ARROW)    || p.keyIsDown(87)) { dr=-1; dir='up';    }

      if (dc || dr) {
        player.dir = dir;
        let nr = player.row + dr;
        let nc = player.col + dc;
        if (canMove(player.row, player.col, nr, nc)) {
          player.row = nr; player.col = nc;
          player.targetX = nc * CELL + CELL / 2;
          player.targetY = HUD_H + nr * CELL + CELL / 2;
          player.moving  = true;
        }
      }
    } else {
      player.x = lerp(player.x, player.targetX, 0.25);
      player.y = lerp(player.y, player.targetY, 0.25);
      if (Math.abs(player.x - player.targetX) < 0.5 &&
          Math.abs(player.y - player.targetY) < 0.5) {
        player.x = player.targetX;
        player.y = player.targetY;
        player.moving = false;
      }
    }
  }

  function drawPlayer() {
    let lv = LEVELS[level].char;
    let key = `char${lv}${player.dir}`;
    let sz = CELL - 4;
    if (imgs[key]) {
      p.image(imgs[key], player.x, player.y, sz, sz);
    } else {
      drawCharacterFallback(player.x, player.y, sz, player.dir, level);
    }
  }

  function drawCharacterFallback(x, y, sz, dir, lv) {
    // Cute placeholder character
    let colors = ['#f7c948','#64d2a4','#6ec1e4','#e87ea1','#ff9966','#b07cdb'];
    p.fill(colors[lv % colors.length]);
    p.noStroke();
    p.ellipse(x, y, sz * 0.85, sz * 0.85);
    // Eyes
    let ex = dir === 'left' ? -1 : dir === 'right' ? 1 : 0;
    let ey = dir === 'up'   ? -1 : dir === 'down'  ? 1 : 0;
    p.fill(30);
    p.ellipse(x + ex * 4 - 3, y + ey * 4 - 3, 5, 5);
    p.ellipse(x + ex * 4 + 3, y + ey * 4 - 3, 5, 5);
  }

  // ============================================================
  // CAN MOVE — checks maze walls
  // ============================================================
  function canMove(r, c, nr, nc) {
    if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) return false;
    let dc = nc - c, dr = nr - r;
    if (dc ===  1) return !maze[r][c].right;
    if (dc === -1) return !maze[r][nc].right;
    if (dr ===  1) return !maze[r][c].down;
    if (dr === -1) return !maze[nr][c].down;
    return false;
  }

  // ============================================================
  // ITEMS
  // ============================================================
  function initItems() {
    let count = LEVELS[level].items;
    let positions = shuffledCells().slice(0, count).map(([r,c]) => ({
      row: r, col: c,
      x: c * CELL + CELL / 2,
      y: HUD_H + r * CELL + CELL / 2,
      collected: false,
      bounce: Math.random() * Math.PI * 2,
    }));
    return positions;
  }

  function drawItems() {
    let lv = LEVELS[level].char;
    items.forEach((it, i) => {
      if (it.collected) return;
      let bob = Math.sin(p.frameCount * 0.05 + it.bounce) * 3;
      let key = `item${lv}${String.fromCharCode(97+i)}`;
      let sz  = CELL - 8;
      if (imgs[key]) {
        p.image(imgs[key], it.x, it.y + bob, sz, sz);
      } else {
        let col = ITEM_COLORS[i % ITEM_COLORS.length];
        let r = parseInt(col.slice(1,3),16);
        let g = parseInt(col.slice(3,5),16);
        let b = parseInt(col.slice(5,7),16);
        p.fill(r, g, b);
        p.noStroke();
        p.rect(it.x - sz/2, it.y + bob - sz/2, sz, sz, 4);
        p.fill(255, 255, 255, 180);
        p.textSize(12);
        p.text(String.fromCharCode(65+i), it.x, it.y + bob);
      }
    });
  }

  function checkItemCollection() {
    items.forEach(it => {
      if (!it.collected && it.row === player.row && it.col === player.col)
        it.collected = true;
    });
  }

  // ============================================================
  // APARTMENT (level 6, phase 1)
  // ============================================================
  function initApartment() {
    let [r, c] = shuffledCells().find(([r,c]) =>
      Math.abs(r - player.row) + Math.abs(c - player.col) > 5
    ) || [ROWS-1, COLS-1];
    return {
      row: r, col: c,
      x: c * CELL + CELL / 2,
      y: HUD_H + r * CELL + CELL / 2,
      targetX: c * CELL + CELL / 2,
      targetY: HUD_H + r * CELL + CELL / 2,
      timer: 0,
      moveInterval: 22, // frames between moves — faster!
    };
  }

  function updateApartment() {
    apartment.timer++;
    if (apartment.timer >= apartment.moveInterval) {
      apartment.timer = 0;
      // random walk
      let dirs = shuffle([[0,1],[0,-1],[1,0],[-1,0]]);
      for (let [dr, dc] of dirs) {
        let nr = apartment.row + dr;
        let nc = apartment.col + dc;
        if (canMove(apartment.row, apartment.col, nr, nc)) {
          apartment.row = nr; apartment.col = nc;
          apartment.targetX = nc * CELL + CELL / 2;
          apartment.targetY = HUD_H + nr * CELL + CELL / 2;
          break;
        }
      }
    }
    apartment.x = lerp(apartment.x, apartment.targetX, 0.15);
    apartment.y = lerp(apartment.y, apartment.targetY, 0.15);

    // Catch check
    if (apartment.row === player.row && apartment.col === player.col) {
      phase6 = 'items';
      items   = initItems();
      initCocktails();
    }
  }

  function drawApartment() {
    let bob = Math.sin(p.frameCount * 0.06) * 4;
    let sz  = CELL - 4;
    if (imgs['apartment']) {
      p.image(imgs['apartment'], apartment.x, apartment.y + bob, sz, sz);
    } else {
      p.fill(200, 160, 100);
      p.noStroke();
      p.rect(apartment.x - sz/2, apartment.y + bob - sz/2, sz, sz, 4);
      p.fill(60, 100, 160);
      p.rect(apartment.x - sz/4, apartment.y + bob - sz/4, sz/2, sz/2, 2);
      p.fill(255);
      p.textSize(10);
      p.text('APT', apartment.x, apartment.y + bob);
    }

    // label
    p.fill(255, 220, 50);
    p.noStroke();
    p.textSize(7);
    p.text('CATCH ME!', apartment.x, apartment.y - CELL/2 - 4);
  }

  // ============================================================
  // COCKTAILS (level 6, phase 2)
  // ============================================================
  function initCocktails() {
    cocktails = [0,1,2].map(i => {
      let [r, c] = shuffledCells().find(([r,c]) =>
        Math.abs(r - player.row) + Math.abs(c - player.col) > 4
      ) || [ROWS-1, COLS-1];
      return {
        row: r, col: c,
        x: c * CELL + CELL / 2,
        y: HUD_H + r * CELL + CELL / 2,
        targetX: c * CELL + CELL / 2,
        targetY: HUD_H + r * CELL + CELL / 2,
        timer: 0,
        moveInterval: 35 + i * 10,
        imgKey: `cocktail${i+1}`,
        color: COCKTAIL_COLORS[i],
        hitCooldown: 0,
      };
    });
  }

  function updateCocktails() {
    cocktails.forEach(ck => {
      ck.hitCooldown = Math.max(0, ck.hitCooldown - 1);
      ck.timer++;
      if (ck.timer >= ck.moveInterval) {
        ck.timer = 0;
        // Move roughly toward player
        let dirs = shuffle([[0,1],[0,-1],[1,0],[-1,0]]);
        let best = null, bestDist = Infinity;
        for (let [dr, dc] of dirs) {
          let nr = ck.row + dr;
          let nc = ck.col + dc;
          if (canMove(ck.row, ck.col, nr, nc)) {
            let dist = Math.abs(nr - player.row) + Math.abs(nc - player.col);
            if (dist < bestDist) { bestDist = dist; best = [nr, nc, dr, dc]; }
          }
        }
        if (best) {
          [ck.row, ck.col] = [best[0], best[1]];
          ck.targetX = ck.col * CELL + CELL / 2;
          ck.targetY = HUD_H + ck.row * CELL + CELL / 2;
        }
      }
      ck.x = lerp(ck.x, ck.targetX, 0.15);
      ck.y = lerp(ck.y, ck.targetY, 0.15);
    });
  }

  function drawCocktails() {
    cocktails.forEach(ck => {
      let bob = Math.sin(p.frameCount * 0.07 + ck.timer) * 3;
      let sz  = CELL - 6;
      if (imgs[ck.imgKey]) {
        p.image(imgs[ck.imgKey], ck.x, ck.y + bob, sz, sz);
      } else {
        let c = ck.color;
        let r = parseInt(c.slice(1,3),16);
        let g = parseInt(c.slice(3,5),16);
        let b = parseInt(c.slice(5,7),16);
        p.fill(r,g,b);
        p.noStroke();
        p.ellipse(ck.x, ck.y + bob, sz, sz);
        p.fill(255);
        p.textSize(11);
        p.text('$25', ck.x, ck.y + bob);
      }
    });
  }

  function checkCocktailCollision() {
    cocktails.forEach(ck => {
      if (ck.hitCooldown > 0) return;
      if (ck.row === player.row && ck.col === player.col) {
        lives--;
        ck.hitCooldown = 120;
        if (lives <= 0) state = 'gameOver';
      }
    });
  }

  // ============================================================
  // HUD
  // ============================================================
  function drawHUD() {
    // HUD bar background
    p.fill(15, 15, 25);
    p.noStroke();
    p.rect(0, 0, CANVAS_W, HUD_H);

    // Pixel scanline effect on HUD
    p.fill(255, 255, 255, 8);
    for (let y = 0; y < HUD_H; y += 4) p.rect(0, y, CANVAS_W, 2);

    // ── Level label (left) ──
    p.fill(255, 220, 80);
    p.noStroke();
    p.textSize(8);
    p.textAlign(p.LEFT, p.CENTER);
    p.text(`LVL ${level+1}`, 10, HUD_H / 2 - 8);
    p.fill(200, 200, 255);
    p.textSize(7);
    p.text(LEVELS[level].label.toUpperCase(), 10, HUD_H / 2 + 8);

    // ── Pixel-art progress bar (centre) — hidden during apartment chase ──
    let showBar = !(level === 5 && phase6 === 'apartment');
    if (showBar) {
      let collected = items.filter(it => it.collected).length;
      let total     = items.length;
      let barW      = 200;
      let barH      = 14;
      let barX      = CANVAS_W / 2 - barW / 2;
      let barY      = HUD_H / 2 + 8;

      // Label above bar
      p.textAlign(p.CENTER, p.CENTER);
      p.fill(180, 230, 255);
      p.textSize(7);
      p.text(`ITEMS: ${collected}/${total}`, CANVAS_W / 2, barY - 10);

      // Bar outer border (pixel style — 2px inset border)
      p.fill(60, 60, 80);
      p.rect(barX - 2, barY - 2, barW + 4, barH + 4);
      p.fill(20, 20, 35);
      p.rect(barX, barY, barW, barH);

      // Filled segments — draw as discrete pixel blocks
      let segW   = Math.floor(barW / total) - 1;
      let segGap = 1;
      for (let i = 0; i < total; i++) {
        let sx = barX + i * (segW + segGap + 1);
        if (i < collected) {
          p.fill(80, 220, 120);
          p.rect(sx, barY, segW, barH);
          p.fill(160, 255, 180);
          p.rect(sx, barY, segW, 3);
        } else {
          p.fill(40, 40, 60);
          p.rect(sx, barY, segW, barH);
          p.fill(50, 50, 75);
          p.rect(sx, barY, segW, 2);
        }
      }
    }

    // ── NYC phase hint (replaces bar during apartment phase) ──
    if (level === 5) {
      p.fill(255, 180, 50);
      p.textSize(6);
      p.textAlign(p.CENTER, p.CENTER);
      let hintY = showBar ? (HUD_H / 2 + 8 + 14 + 8) : HUD_H / 2;
      p.text(phase6 === 'apartment' ? '> FIND THE APARTMENT <' : '> DODGE THE $25 COCKTAILS <',
             CANVAS_W / 2, hintY);
    }

    // ── Lives — shown for all of level 6 ──
    if (level === 5) {
      let heartSz = 18;
      let startX  = CANVAS_W - 14;
      for (let i = 0; i < 3; i++) {
        let hx = startX - i * (heartSz + 4);
        let hy = HUD_H / 2;
        if (imgs['heart'] && i < lives) {
          p.image(imgs['heart'], hx, hy, heartSz, heartSz);
        } else {
          p.fill(i < lives ? p.color(232, 25, 44) : p.color(60, 60, 80));
          p.noStroke();
          drawHeartShape(hx, hy, heartSz);
        }
      }
    }

    p.textAlign(p.CENTER, p.CENTER);
  }

  function drawHeartShape(x, y, sz) {
    let s = sz / 20;
    p.beginShape();
    p.vertex(x, y + 4*s);
    p.bezierVertex(x - 10*s, y - 4*s, x - 20*s, y + 2*s, x, y + 14*s);
    p.bezierVertex(x + 20*s, y + 2*s, x + 10*s, y - 4*s, x, y + 4*s);
    p.endShape(p.CLOSE);
  }

  // ============================================================
  // MOUSE INPUT
  // ============================================================
  p.mousePressed = function() {
    if (state === 'menu') {
      // Check play button
      let bx = CANVAS_W/2, by = CANVAS_H/2 + 105;
      if (p.dist(p.mouseX, p.mouseY, bx, by) < 80) startLevel(0);
    }
    if (state === 'levelClear') {
      let bx = CANVAS_W/2, by = CANVAS_H/2 + 95;
      if (p.dist(p.mouseX, p.mouseY, bx, by) < 80) startLevel(level+1);
    }
    if (state === 'gameOver' || state === 'win') {
      let bx = CANVAS_W/2, by = CANVAS_H/2 + 95;
      if (p.dist(p.mouseX, p.mouseY, bx, by) < 80) {
        level = 0;
        state = 'menu';
      }
    }
  };

  // ============================================================
  // LEVEL START
  // ============================================================
  function startLevel(lv) {
    level  = lv;
    maze   = buildMaze();
    player = initPlayer();
    items  = initItems();
    lives  = 3;
    phase6 = 'apartment';

    if (LEVELS[lv].extra) {
      warningTimer = 180; // 3 seconds at 60fps
      state = 'warning';
      apartment = initApartment();
      items = []; // empty until apartment is caught
    } else {
      state = 'playing';
    }
  }

  // ============================================================
  // UTILS
  // ============================================================
  function shuffledCells() {
    let cells = [];
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (!(r===0 && c===0)) cells.push([r, c]);
    return shuffle(cells);
  }

  function shuffle(arr) {
    let a = [...arr];
    for (let i = a.length-1; i > 0; i--) {
      let j = Math.floor(Math.random() * (i+1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function lerp(a, b, t) { return a + (b - a) * t; }

  function lerpColorHex(h1, h2, t) {
    let parse = h => [
      parseInt(h.slice(1,3),16),
      parseInt(h.slice(3,5),16),
      parseInt(h.slice(5,7),16),
    ];
    let [r1,g1,b1] = parse(h1), [r2,g2,b2] = parse(h2);
    return [
      Math.round(r1 + (r2-r1)*t),
      Math.round(g1 + (g2-g1)*t),
      Math.round(b1 + (b2-b1)*t),
    ];
  }

  function drawStar(x, y, r1, r2, pts) {
    p.beginShape();
    for (let i = 0; i < pts * 2; i++) {
      let angle = (Math.PI / pts) * i - Math.PI / 2;
      let r = (i % 2 === 0) ? r1 : r2;
      p.vertex(x + Math.cos(angle)*r, y + Math.sin(angle)*r);
    }
    p.endShape(p.CLOSE);
  }

  function drawRestartButton(y) {
    p.fill(60, 60, 180);
    p.noStroke();
    p.rect(CANVAS_W/2 - 100, y - 22, 200, 44, 4);
    p.fill(255);
    p.textSize(11);
    p.textStyle(p.BOLD);
    p.text('PLAY AGAIN', CANVAS_W/2, y);
    p.textStyle(p.NORMAL);
  }

}); // end p5 instance
</script>
