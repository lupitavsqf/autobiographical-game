  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;

  }

<script>

// ============================================================
// BACKGROUND MUSIC ENGINE
// ============================================================
const Music = (() => {
  let current = null, currentKey = null, unlocked = false, pendingKey = null;
  const HTMLAudio = window.HTMLAudioElement
    ? (src) => { const a = document.createElement('audio'); a.src = src; return a; } : null;
  const tracks = { home:'bg_home.mp3', farm:'bg_farm.mp3', mid:'bg_2-5.mp3', nyc:'bg_6.mp3' };
  function keyForState(state, level) {
    if(state==='menu') return 'home';
    if(state==='gameOver'||state==='win') return 'nyc';
    if(level===0) return 'farm';
    if(level>=1&&level<=4) return 'mid';
    if(level===5) return 'nyc';
    return 'home';
  }
  function _play(key) {
    if(key===currentKey&&current&&!current.paused) return;
    _stop(); currentKey=key;
    if(!tracks[key]||!HTMLAudio) return;
    try { current=HTMLAudio(tracks[key]); current.loop=true; current.volume=0.45;
          current.onerror=()=>{current=null;}; current.play().catch(()=>{}); }
    catch(e){current=null;}
  }
  function _stop() {
    if(current){try{current.pause();current.currentTime=0;}catch(e){}current=null;} currentKey=null;
  }
  function unlock() { if(unlocked)return; unlocked=true; if(pendingKey){_play(pendingKey);pendingKey=null;} }
  function update(state,level) {
    const key=keyForState(state,level);
    if(!unlocked){pendingKey=key;return;} _play(key);
  }
  function stop(){_stop();pendingKey=null;}
  return{update,stop,unlock};
})();
document.addEventListener('click',  ()=>Music.unlock(),{once:true});
document.addEventListener('keydown',()=>Music.unlock(),{once:true});

// ============================================================
// AUDIO ENGINE (SFX)
// ============================================================
const Audio = (() => {
  let ctx=null;
  function getCtx(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();if(ctx.state==='suspended')ctx.resume();return ctx;}
  function osc(type,freq,start,dur,gainVal,ac){
    const o=ac.createOscillator(),g=ac.createGain();
    o.type=type;o.frequency.setValueAtTime(freq,start);
    g.gain.setValueAtTime(gainVal,start);g.gain.exponentialRampToValueAtTime(0.0001,start+dur);
    o.connect(g);g.connect(ac.destination);o.start(start);o.stop(start+dur);
  }
  function collectItem(idx){
    const ac=getCtx(),now=ac.currentTime;
    const roots=[523,587,659,698,784,880,988,1047,1175],root=roots[idx%roots.length];
    [root,root*1.25,root*1.5,root*2].forEach((freq,i)=>{
      const t=now+i*0.07,o=ac.createOscillator(),g=ac.createGain();
      o.type='square';o.frequency.setValueAtTime(freq,t);
      g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.18);
      o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+0.2);
    });
  }
  function levelStart(){
    const ac=getCtx(),now=ac.currentTime;
    const b=ac.createOscillator(),bg=ac.createGain();
    b.type='sine';b.frequency.setValueAtTime(80,now);b.frequency.exponentialRampToValueAtTime(40,now+0.3);
    bg.gain.setValueAtTime(0.5,now);bg.gain.exponentialRampToValueAtTime(0.0001,now+0.35);
    b.connect(bg);bg.connect(ac.destination);b.start(now);b.stop(now+0.4);
    const s=ac.createOscillator(),sg=ac.createGain();
    s.type='sawtooth';s.frequency.setValueAtTime(200,now+0.1);s.frequency.exponentialRampToValueAtTime(800,now+0.55);
    sg.gain.setValueAtTime(0.15,now+0.1);sg.gain.exponentialRampToValueAtTime(0.0001,now+0.6);
    s.connect(sg);sg.connect(ac.destination);s.start(now+0.1);s.stop(now+0.65);
    [523,659,784,1047].forEach((freq,i)=>osc('square',freq,now+0.4+i*0.1,0.18,0.2,ac));
  }
  function apartmentCatch(){
    const ac=getCtx(),now=ac.currentTime;
    [392,523,659,784,1047,784,1047].forEach((freq,i)=>osc('square',freq,now+i*0.085,0.15,0.22,ac));
    const sh=ac.createOscillator(),shg=ac.createGain();
    sh.type='sine';sh.frequency.setValueAtTime(2093,now);
    shg.gain.setValueAtTime(0.08,now);shg.gain.exponentialRampToValueAtTime(0.0001,now+0.7);
    sh.connect(shg);shg.connect(ac.destination);sh.start(now);sh.stop(now+0.75);
  }
  function lifeHit(){
    const ac=getCtx(),now=ac.currentTime;
    const r=ac.createOscillator(),rg=ac.createGain();
    r.type='sawtooth';r.frequency.setValueAtTime(120,now);r.frequency.exponentialRampToValueAtTime(40,now+0.4);
    rg.gain.setValueAtTime(0.4,now);rg.gain.exponentialRampToValueAtTime(0.0001,now+0.45);
    r.connect(rg);rg.connect(ac.destination);r.start(now);r.stop(now+0.5);
    const w=ac.createOscillator(),wg=ac.createGain();
    w.type='square';w.frequency.setValueAtTime(600,now);w.frequency.exponentialRampToValueAtTime(80,now+0.5);
    wg.gain.setValueAtTime(0.2,now);wg.gain.exponentialRampToValueAtTime(0.0001,now+0.5);
    w.connect(wg);wg.connect(ac.destination);w.start(now);w.stop(now+0.55);
    const buf=ac.createBuffer(1,ac.sampleRate*0.08,ac.sampleRate),data=buf.getChannelData(0);
    for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*(1-i/data.length);
    const noise=ac.createBufferSource(),ng=ac.createGain();
    noise.buffer=buf;ng.gain.setValueAtTime(0.35,now);noise.connect(ng);ng.connect(ac.destination);noise.start(now);
  }
  function levelClear(){
    const ac=getCtx(),now=ac.currentTime;
    const melody=[523,523,659,523,784,698,523,523,659,523,880,784];
    const timing=[0,.12,.24,.36,.48,.6,.78,.90,1.02,1.14,1.26,1.44];
    melody.forEach((freq,i)=>{osc('square',freq,now+timing[i],0.14,0.22,ac);osc('triangle',freq*1.26,now+timing[i],0.14,0.1,ac);});
  }
  function gameOver(){
    const ac=getCtx(),now=ac.currentTime;
    [392,349,311,277,247,220,196].forEach((freq,i)=>osc('sawtooth',freq,now+i*0.15,0.2,0.25,ac));
    const low=ac.createOscillator(),lg=ac.createGain();
    low.type='sine';low.frequency.setValueAtTime(55,now);
    lg.gain.setValueAtTime(0.3,now);lg.gain.exponentialRampToValueAtTime(0.0001,now+1.5);
    low.connect(lg);lg.connect(ac.destination);low.start(now);low.stop(now+1.6);
  }
  function win(){
    const ac=getCtx(),now=ac.currentTime;
    [[261,329,392],[294,370,440],[330,415,494],[349,440,523],[392,494,587],[523,659,784]].forEach(([a,b,c],i)=>{
      osc('square',a,now+i*0.18,0.25,0.2,ac);osc('square',b,now+i*0.18,0.25,0.15,ac);osc('triangle',c,now+i*0.18,0.25,0.12,ac);
    });
    [1047,1319,1568,2093].forEach((freq,i)=>osc('sine',freq,now+1.1+i*0.08,0.15,0.12,ac));
  }
  function menuClick(){const ac=getCtx(),now=ac.currentTime;osc('square',880,now,0.06,0.15,ac);osc('square',1320,now+0.04,0.05,0.12,ac);}
  return{collectItem,levelStart,apartmentCatch,lifeHit,levelClear,gameOver,win,menuClick};
})();

// ============================================================
// GAME CONSTANTS
// ============================================================
const CANVAS_W=800, CANVAS_H=700, HUD_H=88, BOTTOM_H=28, GAME_H=CANVAS_H-HUD_H-BOTTOM_H;
const CELL=64, COLS=Math.floor(CANVAS_W/CELL), ROWS=Math.floor(GAME_H/CELL), WALL_T=5, PLAYER_SPEED=3.5;

// Impact is built into every OS — zero network requests, always renders.
const GFONT = 'Impact, "Arial Narrow", "Arial Black", sans-serif';

const LEVELS=[
  {bg:'farm',       char:1,items:6, label:'The Farm',      life:'CHILDHOOD',           location:'FARM'},
  {bg:'highschool', char:2,items:7, label:'High School',   life:'TEENAGER',            location:'HIGH SCHOOL'},
  {bg:'lab',        char:3,items:6, label:'The Lab',       life:'YOUNG ADULT',         location:'UNDERGRADUATE'},
  {bg:'office',     char:4,items:6, label:'The Office',    life:'YOUNG ADULT',         location:'PROFESSIONAL LIFE'},
  {bg:'china',      char:5,items:7, label:'China',         life:'SABBATICAL \u2014 LEARN AI',location:'CHINA'},
  {bg:'nyc',        char:6,items:9, label:'New York City', life:'GRADUATE LIFE',       location:'NEW YORK CITY',extra:true},
];
const BG_COLORS=[['#7ec850','#5aaa32'],['#f9e4b7','#e8c98a'],['#cce8ff','#9ecfee'],['#ddd5c8','#c0b49e'],['#ff4444','#cc1111'],['#1a1a2e','#16213e']];
const ITEM_COLORS=['#f7c948','#e05c2e','#6ec1e4','#9ddc7a','#e87ea1','#b07cdb','#f4e04d','#64d2a4','#ff9966'];
const COCKTAIL_COLORS=['#ff6b9d','#c44dff','#ffb347'];
const ITEM_NAMES=[[],[],[],[],[],[]];

const rawImgs={};
function startImagePreload(){
  function load(key,src){rawImgs[key]=null;const el=new window.Image();el.onload=()=>{rawImgs[key]=el;};el.onerror=()=>{rawImgs[key]=null;};el.src=src;}
  load('bg_home','bg_home.png');load('bg_gameover','bg_gameover.png');load('bg_won','bg_won.png');
  for(let lv=1;lv<=6;lv++){
    load(`bg${lv}`,`background${lv}.png`);
    ['right','left','up','down'].forEach(d=>load(`char${lv}${d}`,`character${lv}${d}.png`));
    for(let i=0;i<9;i++){const l=String.fromCharCode(97+i);load(`item${lv}${l}`,`item${lv}${l}.png`);}
  }
  load('apartment','apartment.png');
  load('cocktail1','cocktail1.png');load('cocktail2','cocktail2.png');load('cocktail3','cocktail3.png');
  load('heart','heart.png');
}
startImagePreload();

function drawRaw(p,key,x,y,w,h,alpha){
  if(!rawImgs[key])return false;
  try{
    if(alpha!==undefined&&alpha<1){p.drawingContext.save();p.drawingContext.globalAlpha=alpha;}
    p.drawingContext.drawImage(rawImgs[key],x-w/2,y-h/2,w,h);
    if(alpha!==undefined&&alpha<1)p.drawingContext.restore();
    return true;
  }catch(e){return false;}
}

// ============================================================
// p5 SKETCH
// ============================================================
new p5(function(p){
  let state='menu',level=0;
  let maze,player,items,apartment,cocktails,lives,warningTimer;
  let phase6='apartment',heartAnim=null,introTimer=0;
  const INTRO_DURATION=180;
  let collectedHUDItems=[];

  // ----------------------------------------------------------
  // txt() — the ONLY text rendering function used in this file.
  // Writes directly to the canvas 2D context, bypassing p5's
  // textFont/textSize pipeline which fails to apply font stacks
  // reliably on GitHub Pages.
  //
  // p.fill() still sets the colour as normal.
  // align: 'center' (default) | 'left' | 'right'
  // ----------------------------------------------------------
  function txt(size, str, x, y, align) {
    const ctx = p.drawingContext;
    ctx.save();
    ctx.font = `bold ${size}px ${GFONT}`;
    ctx.textBaseline = 'middle';
    ctx.textAlign = align || 'center';
    ctx.fillText(String(str), x, y);
    ctx.restore();
  }

  p.preload=function(){};
  p.setup=function(){
    const cnv=p.createCanvas(CANVAS_W,CANVAS_H);
    cnv.parent('game-container');
    p.imageMode(p.CENTER);p.textAlign(p.CENTER,p.CENTER);p.frameRate(60);
  };

  p.draw=function(){
    p.background(30);
    Music.update(state,level);
    if     (state==='menu')       drawMenu();
    else if(state==='intro')      drawIntro();
    else if(state==='warning')    drawWarning();
    else if(state==='playing')    drawPlaying();
    else if(state==='levelClear') drawLevelClear();
    else if(state==='gameOver')   drawGameOver();
    else if(state==='win')        drawWin();
  };

  // ============================================================
  // MENU
  // ============================================================
  function drawMenu(){
    if(!drawFullBg('bg_home')){
      drawFancyBg(0);
      p.fill(0,0,0,140);p.noStroke();p.rect(0,0,CANVAS_W,CANVAS_H);
      p.fill(255);
      txt(64,'ITEM COLLECTOR',CANVAS_W/2,CANVAS_H/2-110);
      txt(18,'NAVIGATE THE LABYRINTH',CANVAS_W/2,CANVAS_H/2-58);
      txt(18,'COLLECT EVERY ITEM!',CANVAS_W/2,CANVAS_H/2-36);
      p.fill(200,230,255);
      txt(16,'ARROW KEYS OR WASD TO MOVE',CANVAS_W/2,CANVAS_H/2-6);
    }
    drawPrimaryButton('PLAY',CANVAS_W/2,CANVAS_H-80,180,46,[60,180,80]);
  }

  // ============================================================
  // INTRO
  // ============================================================
  function drawIntro(){
    drawFancyBg(level);
    p.fill(0,0,0,180);p.noStroke();p.rect(0,0,CANVAS_W,CANVAS_H);
    const lv=LEVELS[level],progress=introTimer/INTRO_DURATION;
    const fade1=Math.min(1,introTimer/30);
    const fade2=Math.min(1,Math.max(0,(introTimer-30)/30));
    const fade3=Math.min(1,Math.max(0,(introTimer-60)/30));

    // LEVEL N
    p.drawingContext.save();p.drawingContext.globalAlpha=fade1;
    p.fill(255,220,80);txt(26,`LEVEL ${level+1}`,CANVAS_W/2,CANVAS_H/2-100);
    p.drawingContext.restore();

    // divider
    p.stroke(255,220,80,180*fade1);p.strokeWeight(2);
    const lw=300*fade1;
    p.line(CANVAS_W/2-lw/2,CANVAS_H/2-82,CANVAS_W/2+lw/2,CANVAS_H/2-82);
    p.noStroke();

    // life stage
    p.drawingContext.save();p.drawingContext.globalAlpha=fade2;
    p.fill(180,230,255);txt(22,lv.life,CANVAS_W/2,CANVAS_H/2-44);
    p.drawingContext.restore();

    // location (big)
    p.drawingContext.save();p.drawingContext.globalAlpha=fade3;
    const scl=1+(1-fade3)*0.15;
    p.drawingContext.translate(CANVAS_W/2,CANVAS_H/2+20);
    p.drawingContext.scale(scl,scl);
    p.fill(255,255,255);txt(52,lv.location,0,0);
    p.drawingContext.restore();

    // dots
    p.drawingContext.save();p.drawingContext.globalAlpha=0.5*fade3;
    const dots=Math.ceil((1-progress)*3);
    p.fill(255,255,255);txt(20,'· '.repeat(dots).trim(),CANVAS_W/2,CANVAS_H/2+100);
    p.drawingContext.restore();

    introTimer++;
    if(introTimer>=INTRO_DURATION){
      if(LEVELS[level].extra){warningTimer=180;state='warning';}
      else state='playing';
    }
  }

  // ============================================================
  // WARNING
  // ============================================================
  function drawWarning(){
    p.background(10);
    const alpha=Math.abs(Math.sin(p.frameCount*0.08));
    p.drawingContext.save();p.drawingContext.globalAlpha=alpha;
    p.fill(255,50,50);txt(52,'!! EXTRA HARD !!',CANVAS_W/2,CANVAS_H/2-60);
    p.drawingContext.restore();
    p.fill(255,200,0);
    txt(20,'NEW YORK CITY',CANVAS_W/2,CANVAS_H/2-10);
    txt(20,'WATCH OUT FOR $25 COCKTAILS!',CANVAS_W/2,CANVAS_H/2+18);
    p.fill(180,180,255);
    txt(16,'CATCH THE APARTMENT FIRST',CANVAS_W/2,CANVAS_H/2+56);
    txt(16,'TO UNLOCK THE ITEMS',CANVAS_W/2,CANVAS_H/2+74);
    warningTimer--;
    if(warningTimer<=0)state='playing';
  }

  // ============================================================
  // PLAYING
  // ============================================================
  function drawPlaying(){
    drawFancyBg(level);drawMaze();
    if(level===5&&phase6==='apartment'){updateApartment();drawApartment();}
    if(level<5||phase6==='items')drawItems();
    if(level===5&&phase6==='items'){updateCocktails();drawCocktails();checkCocktailCollision();}
    updatePlayer();drawPlayer();checkItemCollection();drawHUD();
    const collected=items.filter(it=>it.collected).length;
    if(items.length>0&&collected===items.length){
      if(level===LEVELS.length-1){Audio.win();state='win';}
      else{Audio.levelClear();state='levelClear';}
    }
  }

  // ============================================================
  // LEVEL CLEAR
  // ============================================================
  function drawLevelClear(){
    drawFancyBg(level);
    p.fill(0,0,0,160);p.noStroke();p.rect(0,0,CANVAS_W,CANVAS_H);
    p.fill(100,255,120);txt(52,'LEVEL CLEAR!',CANVAS_W/2,CANVAS_H/2-60);
    p.fill(255);
    txt(18,LEVELS[level].label.toUpperCase(),CANVAS_W/2,CANVAS_H/2-10);
    txt(18,'ALL ITEMS COLLECTED!',CANVAS_W/2,CANVAS_H/2+14);
    drawPrimaryButton('NEXT LEVEL >',CANVAS_W/2,CANVAS_H-80,220,46,[60,180,80]);
  }

  // ============================================================
  // GAME OVER
  // ============================================================
  function drawGameOver(){
    if(!drawFullBg('bg_gameover')){
      p.background(10);
      p.fill(255,50,50);txt(60,'GAME OVER',CANVAS_W/2,CANVAS_H/2-70);
      p.fill(255);txt(18,'TOO MANY $25 COCKTAILS...',CANVAS_W/2,CANVAS_H/2-10);
    }
    drawPrimaryButton('HOME',CANVAS_W/2,CANVAS_H-80,180,46,[140,30,30]);
  }

  // ============================================================
  // WIN
  // ============================================================
  function drawWin(){
    if(!drawFullBg('bg_won')){
      p.colorMode(p.HSB,360,100,100);p.background(p.frameCount%360,60,20);p.colorMode(p.RGB,255);
      p.fill(255,220,50);txt(60,'YOU WIN!',CANVAS_W/2,CANVAS_H/2-80);
      p.fill(255);txt(20,'ALL 6 LEVELS CONQUERED!',CANVAS_W/2,CANVAS_H/2-20);
    }
    drawPrimaryButton('HOME',CANVAS_W/2,CANVAS_H-80,180,46,[60,120,200]);
  }

  // ============================================================
  // UI HELPERS
  // ============================================================
  function drawFullBg(key){
    if(!rawImgs[key])return false;
    try{p.drawingContext.drawImage(rawImgs[key],0,0,CANVAS_W,CANVAS_H);return true;}catch(e){return false;}
  }

  function drawPrimaryButton(label,cx,cy,w,h,rgb){
    const pulse=Math.sin(p.frameCount*0.05)*5,bw=w+pulse,bh=h+pulse*0.5;
    p.fill(rgb[0],rgb[1],rgb[2]);p.noStroke();p.rect(cx-bw/2,cy-bh/2,bw,bh,8);
    p.fill(255,255,255,50);p.rect(cx-bw/2+4,cy-bh/2+4,bw-8,bh/3,4);
    p.fill(255);txt(26,label,cx,cy);
  }

  function hitButton(mx,my,cx,cy,w,h){
    return mx>cx-w/2-10&&mx<cx+w/2+10&&my>cy-h/2-10&&my<cy+h/2+10;
  }

  // ============================================================
  // BACKGROUND
  // ============================================================
  function drawFancyBg(lv){
    const key=`bg${lv+1}`;
    if(rawImgs[key]){p.drawingContext.drawImage(rawImgs[key],0,0,CANVAS_W,CANVAS_H);return;}
    const[c1,c2]=BG_COLORS[lv]||['#334','#223'];
    for(let y=0;y<CANVAS_H;y+=2){const rc=lerpColorHex(c1,c2,y/CANVAS_H);p.fill(rc[0],rc[1],rc[2]);p.noStroke();p.rect(0,y,CANVAS_W,2);}
    if(lv===0)drawFarmOverlay();if(lv===1)drawSchoolOverlay();if(lv===2)drawLabOverlay();
    if(lv===3)drawOfficeOverlay();if(lv===4)drawChinaOverlay();if(lv===5)drawNYCOverlay();
  }
  function drawFarmOverlay(){
    p.noStroke();p.fill(255,220,50,120);p.ellipse(680,80,80,80);
    for(let x=0;x<CANVAS_W;x+=60){p.fill(160,100,50,60);p.rect(x,GAME_H-30,10,30);p.rect(x-30,GAME_H-22,60,6,3);}
  }
  function drawSchoolOverlay(){
    p.drawingContext.save();p.drawingContext.globalAlpha=0.12;
    p.fill(255,255,255);txt(28,'2 + 2 = 4',160,HUD_H+40,'left');txt(28,'ABC...',160,HUD_H+72,'left');
    p.drawingContext.restore();
  }
  function drawLabOverlay(){
    p.stroke(100,180,255,25);p.strokeWeight(1);
    for(let x=0;x<CANVAS_W;x+=50)p.line(x,HUD_H,x,CANVAS_H);
    for(let y=HUD_H;y<CANVAS_H;y+=50)p.line(0,y,CANVAS_W,y);
    p.noStroke();
  }
  function drawOfficeOverlay(){
    for(let col=0;col<4;col++)for(let row=0;row<3;row++){p.fill(200,220,255,20);p.rect(col*200+10,HUD_H+row*120+20,160,80,4);}
  }
  function drawChinaOverlay(){p.fill(255,220,0,180);for(let i=0;i<5;i++)drawStar(650+i*20,90+(i%2)*20,8,4,5);}
  function drawNYCOverlay(){
    p.fill(20,20,40,200);
    const bs=[[0,80],[80,120],[140,60],[200,140],[280,90],[340,110],[400,80],[460,130],[520,70],[580,100],[640,90],[700,120],[760,80]];
    p.beginShape();p.vertex(0,CANVAS_H);
    bs.forEach(([x,h])=>{p.vertex(x,CANVAS_H-h);p.vertex(x+60,CANVAS_H-h);});
    p.vertex(CANVAS_W,CANVAS_H);p.endShape(p.CLOSE);
    p.noStroke();p.fill(255,255,200,160);
    for(let i=0;i<30;i++){const sx=(i*173)%CANVAS_W,sy=HUD_H+(i*97)%(GAME_H/2),s=1+Math.sin(p.frameCount*0.02+i)*0.5;p.ellipse(sx,sy,s*3,s*3);}
  }

  // ============================================================
  // MAZE
  // ============================================================
  function buildMaze(){
    const walls=[],visited=[];
    for(let r=0;r<ROWS;r++){walls.push([]);visited.push([]);for(let c=0;c<COLS;c++){walls[r].push({right:true,down:true});visited[r].push(false);}}
    function carve(r,c){
      visited[r][c]=true;
      for(let d of shuffle([0,1,2,3])){
        const nr=r+[0,1,0,-1][d],nc=c+[1,0,-1,0][d];
        if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!visited[nr][nc]){
          if(d===0)walls[r][c].right=false;if(d===1)walls[r][c].down=false;
          if(d===2)walls[r][nc].right=false;if(d===3)walls[nr][c].down=false;
          carve(nr,nc);
        }
      }
    }
    carve(0,0);
    const extra=Math.floor(ROWS*COLS*0.30);
    for(let i=0;i<extra;i++){
      const r=Math.floor(Math.random()*ROWS),c=Math.floor(Math.random()*COLS);
      if(Math.random()<0.5&&c<COLS-1)walls[r][c].right=false;else if(r<ROWS-1)walls[r][c].down=false;
    }
    return walls;
  }

  function drawMaze(){
    const wr=level===3?255:80,wg=level===3?255:80,wb=level===3?255:100;
    p.stroke(wr,wg,wb);p.strokeWeight(WALL_T);p.noFill();p.rect(0,HUD_H,CANVAS_W,GAME_H);
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      const x=c*CELL,y=HUD_H+r*CELL;
      if(maze[r][c].right&&c<COLS-1)p.line(x+CELL,y,x+CELL,y+CELL);
      if(maze[r][c].down&&r<ROWS-1)p.line(x,y+CELL,x+CELL,y+CELL);
    }
    p.noStroke();p.fill(0);p.rect(0,CANVAS_H-BOTTOM_H,CANVAS_W,BOTTOM_H);
    p.fill(40,40,40);p.rect(0,CANVAS_H-BOTTOM_H,CANVAS_W,3);p.fill(70,70,70);p.rect(0,CANVAS_H-BOTTOM_H+3,CANVAS_W,2);
  }

  // ============================================================
  // PLAYER
  // ============================================================
  function initPlayer(){
    return{col:0,row:0,x:CELL/2,y:HUD_H+CELL/2,targetX:CELL/2,targetY:HUD_H+CELL/2,
           dir:'right',invincible:false,invincibleTimer:0,blinkOn:true,pendingDir:null,moving:false};
  }
  function resetPlayerToStart(){
    player.col=0;player.row=0;player.x=CELL/2;player.y=HUD_H+CELL/2;
    player.targetX=CELL/2;player.targetY=HUD_H+CELL/2;player.moving=false;player.pendingDir=null;
    player.invincible=true;player.invincibleTimer=180;player.blinkOn=true;
  }
  function getHeldDir(){
    const dirs={right:p.keyIsDown(p.RIGHT_ARROW)||p.keyIsDown(68),left:p.keyIsDown(p.LEFT_ARROW)||p.keyIsDown(65),
                down:p.keyIsDown(p.DOWN_ARROW)||p.keyIsDown(83),up:p.keyIsDown(p.UP_ARROW)||p.keyIsDown(87)};
    for(const d of['right','left','down','up'])if(dirs[d])return d;
    return null;
  }
  function updatePlayer(){
    if(player.invincible){
      player.invincibleTimer--;
      player.blinkOn=Math.floor(player.invincibleTimer/6)%2===0;
      if(player.invincibleTimer<=0){player.invincible=false;player.blinkOn=true;}
    }
    const heldDir=getHeldDir();
    if(heldDir)player.pendingDir=heldDir;
    if(!player.moving){
      for(const tryDir of[player.pendingDir,heldDir]){
        if(!tryDir)continue;
        const dc=tryDir==='right'?1:tryDir==='left'?-1:0;
        const dr=tryDir==='down'?1:tryDir==='up'?-1:0;
        const nr=player.row+dr,nc=player.col+dc;
        if(canMove(player.row,player.col,nr,nc)){
          player.row=nr;player.col=nc;
          player.targetX=nc*CELL+CELL/2;player.targetY=HUD_H+nr*CELL+CELL/2;
          player.dir=tryDir;player.moving=true;player.pendingDir=null;break;
        }
      }
    }
    if(player.moving){
      const dx=player.targetX-player.x,dy=player.targetY-player.y,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<=PLAYER_SPEED){player.x=player.targetX;player.y=player.targetY;player.moving=false;}
      else{player.x+=dx/dist*PLAYER_SPEED;player.y+=dy/dist*PLAYER_SPEED;}
    }
  }
  function drawPlayer(){
    if(player.invincible&&!player.blinkOn)return;
    const lv=LEVELS[level].char,key=`char${lv}${player.dir}`,sz=CELL-4,alpha=player.invincible?0.6:1.0;
    if(!drawRaw(p,key,player.x,player.y,sz,sz,alpha))drawCharFallback(player.x,player.y,sz,player.dir,level,alpha);
  }
  function drawCharFallback(x,y,sz,dir,lv,alpha){
    const cols=['#f7c948','#64d2a4','#6ec1e4','#e87ea1','#ff9966','#b07cdb'],c=cols[lv%cols.length];
    const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16),a=Math.round((alpha||1)*255);
    p.fill(r,g,b,a);p.noStroke();p.ellipse(x,y,sz*0.85,sz*0.85);
    const ex=dir==='left'?-1:dir==='right'?1:0,ey=dir==='up'?-1:dir==='down'?1:0;
    p.fill(30,30,30,a);p.ellipse(x+ex*4-3,y+ey*4-3,5,5);p.ellipse(x+ex*4+3,y+ey*4-3,5,5);
  }

  // ============================================================
  // MOVEMENT
  // ============================================================
  function canMove(r,c,nr,nc){
    if(nr<0||nr>=ROWS||nc<0||nc>=COLS)return false;
    const dc=nc-c,dr=nr-r;
    if(dc===1)return!maze[r][c].right;if(dc===-1)return!maze[r][nc].right;
    if(dr===1)return!maze[r][c].down;if(dr===-1)return!maze[nr][c].down;
    return false;
  }

  // ============================================================
  // ITEMS
  // ============================================================
  function initItems(){
    return shuffledCells().slice(0,LEVELS[level].items).map(([r,c],i)=>({
      row:r,col:c,x:c*CELL+CELL/2,y:HUD_H+r*CELL+CELL/2,collected:false,bounce:Math.random()*Math.PI*2,index:i,
    }));
  }
  function drawItems(){
    const lv=LEVELS[level].char;
    items.forEach((it,i)=>{
      if(it.collected)return;
      const bob=Math.sin(p.frameCount*0.05+it.bounce)*3,key=`item${lv}${String.fromCharCode(97+i)}`,sz=CELL-8;
      if(!drawRaw(p,key,it.x,it.y+bob,sz,sz)){
        const col=ITEM_COLORS[i%ITEM_COLORS.length];
        p.fill(parseInt(col.slice(1,3),16),parseInt(col.slice(3,5),16),parseInt(col.slice(5,7),16));
        p.noStroke();p.rect(it.x-sz/2,it.y+bob-sz/2,sz,sz,4);
        p.fill(255,255,255,180);txt(24,String.fromCharCode(65+i),it.x,it.y+bob);
      }
    });
  }
  function checkItemCollection(){
    items.forEach((it,i)=>{
      if(!it.collected&&it.row===player.row&&it.col===player.col){
        it.collected=true;Audio.collectItem(i);
        collectedHUDItems.push({index:i,key:`item${LEVELS[level].char}${String.fromCharCode(97+i)}`,color:ITEM_COLORS[i%ITEM_COLORS.length],popAnim:12});
      }
    });
    collectedHUDItems.forEach(h=>{if(h.popAnim>0)h.popAnim--;});
  }

  // ============================================================
  // APARTMENT
  // ============================================================
  function initApartment(){
    const[r,c]=shuffledCells().find(([r,c])=>Math.abs(r-player.row)+Math.abs(c-player.col)>5)||[ROWS-1,COLS-1];
    return{row:r,col:c,x:c*CELL+CELL/2,y:HUD_H+r*CELL+CELL/2,targetX:c*CELL+CELL/2,targetY:HUD_H+r*CELL+CELL/2,timer:0,moveInterval:22};
  }
  function updateApartment(){
    apartment.timer++;
    if(apartment.timer>=apartment.moveInterval){
      apartment.timer=0;
      for(const[dr,dc]of shuffle([[0,1],[0,-1],[1,0],[-1,0]])){
        const nr=apartment.row+dr,nc=apartment.col+dc;
        if(canMove(apartment.row,apartment.col,nr,nc)){apartment.row=nr;apartment.col=nc;apartment.targetX=nc*CELL+CELL/2;apartment.targetY=HUD_H+nr*CELL+CELL/2;break;}
      }
    }
    apartment.x=lerp(apartment.x,apartment.targetX,0.15);apartment.y=lerp(apartment.y,apartment.targetY,0.15);
    if(apartment.row===player.row&&apartment.col===player.col){
      phase6='items';items=initItems();collectedHUDItems=[];initCocktails();Audio.apartmentCatch();
    }
  }
  function drawApartment(){
    const bob=Math.sin(p.frameCount*0.06)*4,sz=CELL-4;
    if(!drawRaw(p,'apartment',apartment.x,apartment.y+bob,sz,sz)){
      p.fill(200,160,100);p.noStroke();p.rect(apartment.x-sz/2,apartment.y+bob-sz/2,sz,sz,4);
      p.fill(60,100,160);p.rect(apartment.x-sz/4,apartment.y+bob-sz/4,sz/2,sz/2,2);
      p.fill(255);txt(20,'APT',apartment.x,apartment.y+bob);
    }
    p.fill(255,220,50);txt(14,'CATCH ME!',apartment.x,apartment.y-CELL/2-4);
  }

  // ============================================================
  // COCKTAILS
  // ============================================================
  function initCocktails(){
    cocktails=[0,1,2].map(i=>{
      const[r,c]=shuffledCells().find(([r,c])=>Math.abs(r-player.row)+Math.abs(c-player.col)>4)||[ROWS-1,COLS-1];
      return{row:r,col:c,x:c*CELL+CELL/2,y:HUD_H+r*CELL+CELL/2,targetX:c*CELL+CELL/2,targetY:HUD_H+r*CELL+CELL/2,
             timer:0,moveInterval:35+i*10,imgKey:`cocktail${i+1}`,color:COCKTAIL_COLORS[i],hitCooldown:0};
    });
  }
  function updateCocktails(){
    cocktails.forEach(ck=>{
      ck.hitCooldown=Math.max(0,ck.hitCooldown-1);ck.timer++;
      if(ck.timer>=ck.moveInterval){
        ck.timer=0;let best=null,bestDist=Infinity;
        for(const[dr,dc]of shuffle([[0,1],[0,-1],[1,0],[-1,0]])){
          const nr=ck.row+dr,nc=ck.col+dc;
          if(canMove(ck.row,ck.col,nr,nc)){const d=Math.abs(nr-player.row)+Math.abs(nc-player.col);if(d<bestDist){bestDist=d;best=[nr,nc];}}
        }
        if(best){[ck.row,ck.col]=best;ck.targetX=ck.col*CELL+CELL/2;ck.targetY=HUD_H+ck.row*CELL+CELL/2;}
      }
      ck.x=lerp(ck.x,ck.targetX,0.15);ck.y=lerp(ck.y,ck.targetY,0.15);
    });
  }
  function drawCocktails(){
    cocktails.forEach(ck=>{
      const bob=Math.sin(p.frameCount*0.07+ck.timer)*3,sz=CELL-6;
      if(!drawRaw(p,ck.imgKey,ck.x,ck.y+bob,sz,sz)){
        const c=ck.color;p.fill(parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16));
        p.noStroke();p.ellipse(ck.x,ck.y+bob,sz,sz);p.fill(255);txt(22,'$25',ck.x,ck.y+bob);
      }
    });
  }
  function checkCocktailCollision(){
    if(player.invincible)return;
    cocktails.forEach(ck=>{
      if(ck.hitCooldown>0)return;
      if(ck.row===player.row&&ck.col===player.col){
        lives--;ck.hitCooldown=180;
        heartAnim={index:lives,timer:0,phase:'pulse',pulseDuration:30,blinkDuration:60};
        Audio.lifeHit();resetPlayerToStart();
        if(lives<=0)setTimeout(()=>{Audio.gameOver();state='gameOver';},500);
      }
    });
  }

  // ============================================================
  // HUD
  // ============================================================
  function drawHUD(){
    p.fill(15,15,25);p.noStroke();p.rect(0,0,CANVAS_W,HUD_H);
    p.fill(255,255,255,8);for(let y=0;y<HUD_H;y+=4)p.rect(0,y,CANVAS_W,2);

    p.fill(255,220,80); txt(16,`LVL ${level+1}`,10,HUD_H/2-10,'left');
    p.fill(200,200,255);txt(14,LEVELS[level].label.toUpperCase(),10,HUD_H/2+10,'left');

    const showItemsBar=!(level===5&&phase6==='apartment');
    if(showItemsBar){
      const total=LEVELS[level].items,names=ITEM_NAMES[level]||[];
      const slotSz=28,gap=4,totalW=total*(slotSz+gap)-gap,startX=CANVAS_W/2-totalW/2,slotY=HUD_H/2-8;
      for(let i=0;i<total;i++){
        const cx=startX+i*(slotSz+gap)+slotSz/2,cy=slotY;
        const isCollected=i<collectedHUDItems.length,hudItem=collectedHUDItems[i];
        let scl=1.0;
        if(isCollected&&hudItem&&hudItem.popAnim>0)scl=1+0.4*Math.sin((1-hudItem.popAnim/12)*Math.PI);
        const sz=slotSz*scl;
        p.fill(30,30,50);p.noStroke();p.rect(cx-slotSz/2-1,cy-slotSz/2-1,slotSz+2,slotSz+2,3);
        if(isCollected&&hudItem){
          if(!drawRaw(p,hudItem.key,cx,cy,sz,sz)){
            const col=hudItem.color;
            p.fill(parseInt(col.slice(1,3),16),parseInt(col.slice(3,5),16),parseInt(col.slice(5,7),16));
            p.noStroke();p.rect(cx-sz/2,cy-sz/2,sz,sz,3);p.fill(255,255,255,200);txt(16,String.fromCharCode(65+i),cx,cy);
          }
          p.fill(255,255,255,40);p.noStroke();p.rect(cx-slotSz/2,cy-slotSz/2,slotSz,slotSz/3,3);
        } else {
          p.stroke(60,60,80);p.strokeWeight(1);p.noFill();p.rect(cx-slotSz/2,cy-slotSz/2,slotSz,slotSz,3);
          p.noStroke();p.fill(40,40,60,180);txt(14,'?',cx,cy);
        }
        const itemName=names[i];
        if(itemName&&itemName.length>0){
          p.fill(isCollected?p.color(255,220,80):p.color(120,120,150));txt(10,itemName.toUpperCase(),cx,cy+slotSz/2+8);
        }
      }
    }

    if(level===5){
      p.fill(255,180,50);
      const hintY=showItemsBar?(HUD_H/2+26):HUD_H/2;
      txt(13,phase6==='apartment'?'> FIND THE APARTMENT <':'> DODGE THE $25 COCKTAILS <',CANVAS_W/2,hintY);
      const baseSize=18,startX=CANVAS_W-14,heartY=HUD_H/2;
      if(heartAnim)heartAnim.timer++;
      for(let i=0;i<3;i++){
        let hx=startX-i*(baseSize+4),sz=baseSize,heartAlpha=1.0;
        const isAnimatingHeart=heartAnim&&heartAnim.index===i;
        if(isAnimatingHeart){
          const t=heartAnim.timer;
          if(heartAnim.phase==='pulse'){
            sz=baseSize*(1+0.8*Math.sin(t/heartAnim.pulseDuration*Math.PI));
            if(t>=heartAnim.pulseDuration){heartAnim.phase='blink';heartAnim.timer=0;}
          } else if(heartAnim.phase==='blink'){
            const t2=heartAnim.timer;
            heartAlpha=Math.floor(t2/6)%2===0?Math.max(0,1-t2/heartAnim.blinkDuration):0;
            if(t2>=heartAnim.blinkDuration){heartAnim=null;heartAlpha=0;sz=0;}
          }
        }
        const isAlive=i<lives;
        if(!isAlive&&!isAnimatingHeart)continue;if(sz<=0)continue;
        const isFilledHeart=isAlive||isAnimatingHeart;
        p.drawingContext.save();p.drawingContext.globalAlpha=heartAlpha;
        if(rawImgs['heart']&&isFilledHeart){p.drawingContext.drawImage(rawImgs['heart'],hx-sz/2,heartY-sz/2,sz,sz);}
        else{p.fill(isFilledHeart?p.color(232,25,44):p.color(60,60,80));p.noStroke();drawHeartShape(hx,heartY,sz);}
        p.drawingContext.restore();
      }
    }
  }

  function drawHeartShape(x,y,sz){
    const s=sz/20;p.beginShape();p.vertex(x,y+4*s);
    p.bezierVertex(x-10*s,y-4*s,x-20*s,y+2*s,x,y+14*s);
    p.bezierVertex(x+20*s,y+2*s,x+10*s,y-4*s,x,y+4*s);p.endShape(p.CLOSE);
  }

  // ============================================================
  // MOUSE
  // ============================================================
  p.mousePressed=function(){
    const mx=p.mouseX,my=p.mouseY;
    if(state==='menu'       &&hitButton(mx,my,CANVAS_W/2,CANVAS_H-80,180,46)){Audio.menuClick();startLevel(0);}
    if(state==='levelClear' &&hitButton(mx,my,CANVAS_W/2,CANVAS_H-80,220,46)){Audio.menuClick();startLevel(level+1);}
    if((state==='gameOver'||state==='win')&&hitButton(mx,my,CANVAS_W/2,CANVAS_H-80,180,46)){Audio.menuClick();level=0;state='menu';}
  };

  // ============================================================
  // START LEVEL
  // ============================================================
  function startLevel(lv){
    level=lv;maze=buildMaze();player=initPlayer();items=initItems();
    collectedHUDItems=[];lives=3;phase6='apartment';heartAnim=null;
    Audio.levelStart();introTimer=0;state='intro';
    if(LEVELS[lv].extra){apartment=initApartment();items=[];}
  }

  // ============================================================
  // UTILS
  // ============================================================
  function shuffledCells(){
    const cells=[];
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(!(r===0&&c===0))cells.push([r,c]);
    return shuffle(cells);
  }
  function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
  function lerp(a,b,t){return a+(b-a)*t;}
  function lerpColorHex(h1,h2,t){
    const parse=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
    const[r1,g1,b1]=parse(h1),[r2,g2,b2]=parse(h2);
    return[Math.round(r1+(r2-r1)*t),Math.round(g1+(g2-g1)*t),Math.round(b1+(b2-b1)*t)];
  }
  function drawStar(x,y,r1,r2,pts){
    p.beginShape();
    for(let i=0;i<pts*2;i++){const a=(Math.PI/pts)*i-Math.PI/2,r=i%2===0?r1:r2;p.vertex(x+Math.cos(a)*r,y+Math.sin(a)*r);}
    p.endShape(p.CLOSE);
  }

}); // end p5
</script>
