// ============================================================
// BACKGROUND MUSIC ENGINE
// ============================================================
const Music = (() => {
  let current = null;
  let currentKey = null;
  const HTMLAudio = window.HTMLAudioElement
    ? (src) => { const a = document.createElement('audio'); a.src = src; return a; }
    : null;

  const tracks = {
    home:  'bg_home.mp3',
    farm:  'bg_farm.mp3',
    mid:   'bg_2-5.mp3',
    nyc:   'bg_6.mp3',
  };

  function keyForState(state, level) {
    if (state === 'menu') return 'home';
    if (state === 'gameOver' || state === 'win') return 'nyc';
    if (level === 0) return 'farm';
    if (level >= 1 && level <= 4) return 'mid';
    if (level === 5) return 'nyc';
    return 'home';
  }

  function play(key) {
    if (key === currentKey && current && !current.paused) return;
    stop();
    currentKey = key;
    if (!tracks[key] || !HTMLAudio) return;
    try {
      current = HTMLAudio(tracks[key]);
      current.loop = true;
      current.volume = 0.45;
      // If the file is missing, onerror fires — just stay silent
      current.onerror = () => { current = null; };
      current.play().catch(() => {});
    } catch(e) {
      current = null;
    }
  }

  function stop() {
    if (current) {
      try { current.pause(); current.currentTime = 0; } catch(e) {}
      current = null;
    }
    currentKey = null;
  }

  function update(state, level) {
    let key = keyForState(state, level);
    play(key);
  }

  return { update, stop, play };
})();

// ============================================================
// AUDIO ENGINE (SFX)
// ============================================================
const Audio = (() => {
  let ctx = null;
  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  function osc(type, freq, start, dur, gainVal, ac) {
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, start);
    g.gain.setValueAtTime(gainVal, start);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    o.connect(g); g.connect(ac.destination);
    o.start(start); o.stop(start + dur);
    return { osc: o, gain: g };
  }

  function collectItem(itemIndex) {
    const ac = getCtx();
    const now = ac.currentTime;
    const roots = [523, 587, 659, 698, 784, 880, 988, 1047, 1175];
    const root  = roots[itemIndex % roots.length];
    const chord = [root, root * 1.25, root * 1.5, root * 2];
    chord.forEach((freq, i) => {
      const t = now + i * 0.07;
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.type = 'square';
      o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0.18, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
      o.connect(g); g.connect(ac.destination);
      o.start(t); o.stop(t + 0.2);
    });
  }

  function levelStart() {
    const ac = getCtx();
    const now = ac.currentTime;
    const b = ac.createOscillator(); const bg = ac.createGain();
    b.type = 'sine'; b.frequency.setValueAtTime(80, now); b.frequency.exponentialRampToValueAtTime(40, now + 0.3);
    bg.gain.setValueAtTime(0.5, now); bg.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
    b.connect(bg); bg.connect(ac.destination); b.start(now); b.stop(now + 0.4);
    const s = ac.createOscillator(); const sg = ac.createGain();
    s.type = 'sawtooth'; s.frequency.setValueAtTime(200, now + 0.1); s.frequency.exponentialRampToValueAtTime(800, now + 0.55);
    sg.gain.setValueAtTime(0.15, now + 0.1); sg.gain.exponentialRampToValueAtTime(0.0001, now + 0.6);
    s.connect(sg); sg.connect(ac.destination); s.start(now + 0.1); s.stop(now + 0.65);
    [523, 659, 784, 1047].forEach((freq, i) => { const t = now + 0.4 + i * 0.1; osc('square', freq, t, 0.18, 0.2, ac); });
  }

  function apartmentCatch() {
    const ac = getCtx(); const now = ac.currentTime;
    [392, 523, 659, 784, 1047, 784, 1047].forEach((freq, i) => { const t = now + i * 0.085; osc('square', freq, t, 0.15, 0.22, ac); });
    const sh = ac.createOscillator(); const shg = ac.createGain();
    sh.type = 'sine'; sh.frequency.setValueAtTime(2093, now);
    shg.gain.setValueAtTime(0.08, now); shg.gain.exponentialRampToValueAtTime(0.0001, now + 0.7);
    sh.connect(shg); shg.connect(ac.destination); sh.start(now); sh.stop(now + 0.75);
  }

  function lifeHit() {
    const ac = getCtx(); const now = ac.currentTime;
    const r = ac.createOscillator(); const rg = ac.createGain();
    r.type = 'sawtooth'; r.frequency.setValueAtTime(120, now); r.frequency.exponentialRampToValueAtTime(40, now + 0.4);
    rg.gain.setValueAtTime(0.4, now); rg.gain.exponentialRampToValueAtTime(0.0001, now + 0.45);
    r.connect(rg); rg.connect(ac.destination); r.start(now); r.stop(now + 0.5);
    const w = ac.createOscillator(); const wg = ac.createGain();
    w.type = 'square'; w.frequency.setValueAtTime(600, now); w.frequency.exponentialRampToValueAtTime(80, now + 0.5);
    wg.gain.setValueAtTime(0.2, now); wg.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
    w.connect(wg); wg.connect(ac.destination); w.start(now); w.stop(now + 0.55);
    const buf = ac.createBuffer(1, ac.sampleRate * 0.08, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
    const noise = ac.createBufferSource(); const ng = ac.createGain();
    noise.buffer = buf; ng.gain.setValueAtTime(0.35, now);
    noise.connect(ng); ng.connect(ac.destination); noise.start(now);
  }

  function levelClear() {
    const ac = getCtx(); const now = ac.currentTime;
    const melody = [523,523,659,523,784,698,523,523,659,523,880,784];
    const timing  = [0,.12,.24,.36,.48,.6,.78,.90,1.02,1.14,1.26,1.44];
    melody.forEach((freq, i) => {
      const t = now + timing[i];
      osc('square', freq, t, 0.14, 0.22, ac);
      osc('triangle', freq * 1.26, t, 0.14, 0.1, ac);
    });
  }

  function gameOver() {
    const ac = getCtx(); const now = ac.currentTime;
    [392,349,311,277,247,220,196].forEach((freq, i) => { const t = now + i * 0.15; osc('sawtooth', freq, t, 0.2, 0.25, ac); });
    const low = ac.createOscillator(); const lg = ac.createGain();
    low.type = 'sine'; low.frequency.setValueAtTime(55, now);
    lg.gain.setValueAtTime(0.3, now); lg.gain.exponentialRampToValueAtTime(0.0001, now + 1.5);
    low.connect(lg); lg.connect(ac.destination); low.start(now); low.stop(now + 1.6);
  }

  function win() {
    const ac = getCtx(); const now = ac.currentTime;
    const chords = [[261,329,392],[294,370,440],[330,415,494],[349,440,523],[392,494,587],[523,659,784]];
    chords.forEach(([a,b,c], i) => {
      const t = now + i * 0.18;
      osc('square', a, t, 0.25, 0.2, ac); osc('square', b, t, 0.25, 0.15, ac); osc('triangle', c, t, 0.25, 0.12, ac);
    });
    [1047,1319,1568,2093].forEach((freq, i) => { const t = now + 1.1 + i * 0.08; osc('sine', freq, t, 0.15, 0.12, ac); });
  }

  function menuClick() {
    const ac = getCtx(); const now = ac.currentTime;
    osc('square', 880, now, 0.06, 0.15, ac);
    osc('square', 1320, now + 0.04, 0.05, 0.12, ac);
  }

  return { collectItem, levelStart, apartmentCatch, lifeHit, levelClear, gameOver, win, menuClick };
})();

const ITEM_NAMES = [

const PATH = {
  bg:        n     => `background${n}.png`,
  char:      (n,d) => `character${n}${d}.png`,
  item:      (n,l) => `item${n}${l}.png`,
  apartment: ()    => `apartment.png`,
  cocktail:  n     => `cocktail${n}.png`,
  heart:     ()    => `heart.png`,
};

const rawImgs = {};

function startImagePreload() {
  function load(key, src) {
    rawImgs[key] = null;
    const el = new window.Image();
    el.onload  = () => { rawImgs[key] = el; };
    el.onerror = () => { rawImgs[key] = null; };
    el.src = src;
  }
  load('bg_home',     'bg_home.png');
  load('bg_gameover', 'bg_gameover.png');
  load('bg_won',      'bg_won.png');

  for (let lv = 1; lv <= 6; lv++) {
    load(`bg${lv}`, PATH.bg(lv));
    ['right','left','up','down'].forEach(d =>
      load(`char${lv}${d}`, PATH.char(lv, d))
    );
    for (let i = 0; i < 9; i++) {
      let l = String.fromCharCode(97 + i);
      load(`item${lv}${l}`, PATH.item(lv, l));
    }
  }
  load('apartment', PATH.apartment());
  load('cocktail1', PATH.cocktail(1));
  load('cocktail2', PATH.cocktail(2));
  load('cocktail3', PATH.cocktail(3));
  load('heart',     PATH.heart());
}

startImagePreload();

function drawRaw(p, key, x, y, w, h, alpha) {
  if (!rawImgs[key]) return false;
  try {
    if (alpha !== undefined && alpha < 1) {
      p.drawingContext.save();
      p.drawingContext.globalAlpha = alpha;
    }
    p.drawingContext.drawImage(rawImgs[key], x - w/2, y - h/2, w, h);
    if (alpha !== undefined && alpha < 1) {
      p.drawingContext.restore();
    }
    return true;
  } catch(e) { return false; }
}

new p5(function(p) {

  let state  = 'menu';
  let level  = 0;
  let maze, player, items, apartment, cocktails, lives, warningTimer;
  let phase6 = 'apartment';
  let heartAnim = null;
  // Level intro screen
  let introTimer = 0;
  const INTRO_DURATION = 180; // 3 seconds at 60fps

  // Collected item thumbnails for HUD: array of {index, key, color, popAnim}
  let collectedHUDItems = [];

  p.preload = function() {};

  p.setup = function() {
    let cnv = p.createCanvas(CANVAS_W, CANVAS_H);
    cnv.parent('game-container');
    p.imageMode(p.CENTER);
    p.textAlign(p.CENTER, p.CENTER);
    p.frameRate(60);
    p.textFont('Bungee');
  };

  p.draw = function() {
    p.background(30);
    Music.update(state, level);

    if      (state === 'menu')       drawMenu();
    else if (state === 'intro')      drawIntro();
    else if (state === 'warning')    drawWarning();
    else if (state === 'playing')    drawPlaying();
    else if (state === 'levelClear') drawLevelClear();
    else if (state === 'gameOver')   drawGameOver();
    else if (state === 'win')        drawWin();
  };

  // ============================================================
  // MENU
  // ============================================================
  function drawMenu() {
    if (!drawFullBg('bg_home')) {
      drawFancyBg(0);
      p.fill(0, 0, 0, 140); p.noStroke(); p.rect(0, 0, CANVAS_W, CANVAS_H);
      p.fill(255);
      p.textSize(48 * FONT_SCALE);
      p.text('ITEM COLLECTOR', CANVAS_W/2, CANVAS_H/2 - 110);
      p.fill(255);
      p.textSize(8 * FONT_SCALE);
      p.text('NAVIGATE THE LABYRINTH', CANVAS_W/2, CANVAS_H/2 - 58);
      p.text('COLLECT EVERY ITEM!',    CANVAS_W/2, CANVAS_H/2 - 36);
      p.fill(200, 230, 255);
      p.textSize(7 * FONT_SCALE);
      p.text('ARROW KEYS OR WASD TO MOVE', CANVAS_W/2, CANVAS_H/2 - 6);
    }
    drawPrimaryButton('PLAY', CANVAS_W/2, CANVAS_H - 80, 180, 46, [60, 180, 80]);
  }

  // ============================================================
  // LEVEL INTRO SCREEN
  // ============================================================
  function drawIntro() {
    // Background: use level's bg image or colored bg
    drawFancyBg(level);

    // Dark overlay
    p.fill(0, 0, 0, 180); p.noStroke(); p.rect(0, 0, CANVAS_W, CANVAS_H);

    let lv = LEVELS[level];
    let progress = introTimer / INTRO_DURATION;

    // Slide-in animation: elements appear sequentially
    let fade1 = Math.min(1, introTimer / 30);
    let fade2 = Math.min(1, Math.max(0, (introTimer - 30) / 30));
    let fade3 = Math.min(1, Math.max(0, (introTimer - 60) / 30));

    // Level number — top accent
    p.fill(255, 220, 80, 255 * fade1);
    p.noStroke();
    p.textSize(11 * FONT_SCALE);
    p.text(`LEVEL ${level + 1}`, CANVAS_W/2, CANVAS_H/2 - 100);

    // Decorative line
    let lineW = 300 * fade1;
    p.stroke(255, 220, 80, 180 * fade1);
    p.strokeWeight(2);
    p.line(CANVAS_W/2 - lineW/2, CANVAS_H/2 - 82, CANVAS_W/2 + lineW/2, CANVAS_H/2 - 82);
    p.noStroke();

    // Life stage (e.g. CHILDHOOD)
    p.fill(180, 230, 255, 255 * fade2);
    p.textSize(10 * FONT_SCALE);
    p.text(lv.life, CANVAS_W/2, CANVAS_H/2 - 44);

    // Location — big title
    p.fill(255, 255, 255, 255 * fade3);
    p.textSize(32 * FONT_SCALE);
    // Slight scale pop on entry
    let scl = 1 + (1 - fade3) * 0.15;
    p.push();
    p.translate(CANVAS_W/2, CANVAS_H/2 + 20);
    p.scale(scl);
    p.textAlign(p.CENTER, p.CENTER);
    p.text(lv.location, 0, 0);
    p.pop();

    // Bottom countdown dots
    let dots = Math.ceil((1 - progress) * 3);
    p.fill(255, 255, 255, 120 * fade3);
    p.textSize(9 * FONT_SCALE);
    p.text('· '.repeat(dots).trim(), CANVAS_W/2, CANVAS_H/2 + 100);

    introTimer++;
    if (introTimer >= INTRO_DURATION) {
      // For NYC level, show warning screen; otherwise go straight to playing
      if (LEVELS[level].extra) {
        warningTimer = 180;
        state = 'warning';
      } else {
        state = 'playing';
      }
    }
  }

  // ============================================================
  // WARNING
  // ============================================================
  function drawWarning() {
    p.background(10);
    let alpha = Math.abs(Math.sin(p.frameCount * 0.08)) * 255;
    p.fill(255, 50, 50, alpha);
    p.noStroke();
    p.textSize(26 * FONT_SCALE);
    p.text('!! EXTRA HARD !!', CANVAS_W/2, CANVAS_H/2 - 60);
    p.fill(255, 200, 0);
    p.textSize(9 * FONT_SCALE);
    p.text('NEW YORK CITY',               CANVAS_W/2, CANVAS_H/2 - 10);
    p.text('WATCH OUT FOR $25 COCKTAILS!',CANVAS_W/2, CANVAS_H/2 + 18);
    p.fill(180, 180, 255);
    p.textSize(7 * FONT_SCALE);
    p.text('CATCH THE APARTMENT FIRST', CANVAS_W/2, CANVAS_H/2 + 56);
    p.text('TO UNLOCK THE ITEMS',       CANVAS_W/2, CANVAS_H/2 + 74);
    warningTimer--;
    if (warningTimer <= 0) state = 'playing';
  }

  // ============================================================
  // PLAYING
  // ============================================================
  function drawPlaying() {
    drawFancyBg(level);
    drawMaze();

    if (level === 5 && phase6 === 'apartment') {
      updateApartment();
      drawApartment();
    }
    if (level < 5 || phase6 === 'items') drawItems();
    if (level === 5 && phase6 === 'items') {
      updateCocktails();
      drawCocktails();
      checkCocktailCollision();
    }

    updatePlayer();
    drawPlayer();
    checkItemCollection();
    drawHUD();

    let collected = items.filter(it => it.collected).length;
    if (items.length > 0 && collected === items.length) {
      if (level === LEVELS.length - 1) {
        Audio.win();
        state = 'win';
      } else {
        Audio.levelClear();
        state = 'levelClear';
      }
    }
  }

  // ============================================================
  // LEVEL CLEAR
  // ============================================================
  function drawLevelClear() {
    drawFancyBg(level);
    p.fill(0,0,0,160); p.noStroke(); p.rect(0,0,CANVAS_W,CANVAS_H);
    p.fill(100,255,120); p.textSize(26 * FONT_SCALE);
    p.text('LEVEL CLEAR!', CANVAS_W/2, CANVAS_H/2-60);
    p.fill(255); p.textSize(8 * FONT_SCALE);
    p.text(LEVELS[level].label.toUpperCase(), CANVAS_W/2, CANVAS_H/2-10);
    p.text('ALL ITEMS COLLECTED!',            CANVAS_W/2, CANVAS_H/2+14);
    drawPrimaryButton('NEXT LEVEL >', CANVAS_W/2, CANVAS_H - 80, 220, 46, [60,180,80]);
  }

  // ============================================================
  // GAME OVER
  // ============================================================
  function drawGameOver() {
    if (!drawFullBg('bg_gameover')) {
      p.background(10);
      p.fill(255,50,50); p.textSize(30 * FONT_SCALE);
      p.text('GAME OVER', CANVAS_W/2, CANVAS_H/2-70);
      p.fill(255); p.textSize(8 * FONT_SCALE);
      p.text('TOO MANY $25 COCKTAILS...', CANVAS_W/2, CANVAS_H/2-10);
    }
    drawPrimaryButton('HOME', CANVAS_W/2, CANVAS_H - 80, 180, 46, [140,30,30]);
  }

  // ============================================================
  // WIN
  // ============================================================
  function drawWin() {
    if (!drawFullBg('bg_won')) {
      p.colorMode(p.HSB,360,100,100);
      p.background(p.frameCount%360,60,20);
      p.colorMode(p.RGB,255);
      p.fill(255,220,50); p.textSize(30 * FONT_SCALE);
      p.text('YOU WIN!', CANVAS_W/2, CANVAS_H/2-80);
      p.fill(255); p.textSize(9 * FONT_SCALE);
      p.text('ALL 6 LEVELS CONQUERED!', CANVAS_W/2, CANVAS_H/2-20);
    }
    drawPrimaryButton('HOME', CANVAS_W/2, CANVAS_H - 80, 180, 46, [60,120,200]);
  }

  // ============================================================
  // SHARED UI HELPERS
  // ============================================================
  function drawFullBg(key) {
    if (!rawImgs[key]) return false;
    try {
      p.drawingContext.drawImage(rawImgs[key], 0, 0, CANVAS_W, CANVAS_H);
      return true;
    } catch(e) { return false; }
  }

  function drawPrimaryButton(label, cx, cy, w, h, rgb) {
    let pulse = Math.sin(p.frameCount * 0.05) * 5;
    let bw = w + pulse, bh = h + pulse * 0.5;
    p.fill(rgb[0], rgb[1], rgb[2]);
    p.noStroke();
    p.rect(cx - bw/2, cy - bh/2, bw, bh, 8);
    p.fill(255, 255, 255, 50);
    p.rect(cx - bw/2 + 4, cy - bh/2 + 4, bw - 8, bh/3, 4);
    p.fill(255);
    p.textFont('Bungee');
    p.textSize(13 * FONT_SCALE);
    p.text(label, cx, cy);
  }

  function hitButton(mx, my, cx, cy, w, h) {
    return mx > cx - w/2 - 10 && mx < cx + w/2 + 10 &&
           my > cy - h/2 - 10 && my < cy + h/2 + 10;
  }

  // ============================================================
  // BACKGROUND
  // ============================================================
  function drawFancyBg(lv) {
    let key = `bg${lv + 1}`;
    if (rawImgs[key]) {
      p.drawingContext.drawImage(rawImgs[key], 0, 0, CANVAS_W, CANVAS_H);
      return;
    }
    let [c1,c2] = BG_COLORS[lv] || ['#334','#223'];
    for (let y = 0; y < CANVAS_H; y += 2) {
      let rc = lerpColorHex(c1, c2, y/CANVAS_H);
      p.fill(rc[0],rc[1],rc[2]); p.noStroke(); p.rect(0,y,CANVAS_W,2);
    }
    if (lv===0) drawFarmOverlay();
    if (lv===1) drawSchoolOverlay();
    if (lv===2) drawLabOverlay();
    if (lv===3) drawOfficeOverlay();
    if (lv===4) drawChinaOverlay();
    if (lv===5) drawNYCOverlay();
  }

            [400,80],[460,130],[520,70],[580,100],[640,90],[700,120],[760,80]];

  // ============================================================
  // MAZE
  // ============================================================
  function buildMaze() {
    let walls=[],visited=[];
    for (let r=0;r<ROWS;r++){
      walls.push([]); visited.push([]);
      for (let c=0;c<COLS;c++){walls[r].push({right:true,down:true});visited[r].push(false);}
    }
    function carve(r,c){
      visited[r][c]=true;
      for (let d of shuffle([0,1,2,3])){
        let nr=r+[0,1,0,-1][d],nc=c+[1,0,-1,0][d];
        if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!visited[nr][nc]){
          if(d===0)walls[r][c].right=false;
          if(d===1)walls[r][c].down=false;
          if(d===2)walls[r][nc].right=false;
          if(d===3)walls[nr][c].down=false;
          carve(nr,nc);
        }
      }
    }
    carve(0,0);
    let extra=Math.floor(ROWS*COLS*0.30);
    for(let i=0;i<extra;i++){
      let r=Math.floor(Math.random()*ROWS),c=Math.floor(Math.random()*COLS);
      if(Math.random()<0.5&&c<COLS-1)walls[r][c].right=false;
      else if(r<ROWS-1)walls[r][c].down=false;
    }
    return walls;
  }

  function drawMaze() {
    // Level 4 (index 3): white walls; all others: dark gray
    let wallR, wallG, wallB;
    if (level === 3) {
      wallR = 255; wallG = 255; wallB = 255;
    } else {
      wallR = 80; wallG = 80; wallB = 100;
    }
    p.stroke(wallR, wallG, wallB); p.strokeWeight(WALL_T); p.noFill();
    p.rect(0,HUD_H,CANVAS_W,GAME_H);
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      let x=c*CELL,y=HUD_H+r*CELL;
      if(maze[r][c].right&&c<COLS-1) p.line(x+CELL,y,x+CELL,y+CELL);
      if(maze[r][c].down&&r<ROWS-1)  p.line(x,y+CELL,x+CELL,y+CELL);
    }
    p.noStroke();
    p.fill(0); p.rect(0,CANVAS_H-BOTTOM_H,CANVAS_W,BOTTOM_H);
    p.fill(40,40,40); p.rect(0,CANVAS_H-BOTTOM_H,CANVAS_W,3);
    p.fill(70,70,70); p.rect(0,CANVAS_H-BOTTOM_H+3,CANVAS_W,2);
  }

  // ============================================================
  // PLAYER — smooth continuous movement
  // ============================================================
  function initPlayer() {
    let startX = CELL / 2;
    let startY = HUD_H + CELL / 2;
    return {
      col: 0, row: 0,
      x: startX, y: startY,
      targetX: startX, targetY: startY,
      dir: 'right',
      invincible: false,
      invincibleTimer: 0,
      blinkOn: true,
      pendingDir: null,
      moving: false,
    };
  }

  function resetPlayerToStart() {
    let startX = CELL / 2;
    let startY = HUD_H + CELL / 2;
    player.col = 0; player.row = 0;
    player.x = startX; player.y = startY;
    player.targetX = startX; player.targetY = startY;
    player.moving = false;
    player.pendingDir = null;
    player.invincible = true;
    player.invincibleTimer = 180;
    player.blinkOn = true;
  }

  function getHeldDir() {
    const dirs = {
      right: p.keyIsDown(p.RIGHT_ARROW) || p.keyIsDown(68),
      left:  p.keyIsDown(p.LEFT_ARROW)  || p.keyIsDown(65),
      down:  p.keyIsDown(p.DOWN_ARROW)  || p.keyIsDown(83),
      up:    p.keyIsDown(p.UP_ARROW)    || p.keyIsDown(87),
    };
    for (let d of ['right','left','down','up']) {
      if (dirs[d]) return d;
    }
    return null;
  }

  function updatePlayer() {
    if (player.invincible) {
      player.invincibleTimer--;
      player.blinkOn = Math.floor(player.invincibleTimer / 6) % 2 === 0;
      if (player.invincibleTimer <= 0) { player.invincible = false; player.blinkOn = true; }
    }

    let heldDir = getHeldDir();
    if (heldDir) player.pendingDir = heldDir;

    if (!player.moving) {
      let tryDir = player.pendingDir || heldDir;
      if (tryDir) {
        let dc = tryDir==='right'?1 : tryDir==='left'?-1 : 0;
        let dr = tryDir==='down' ?1 : tryDir==='up'  ?-1 : 0;
        let nr = player.row + dr, nc = player.col + dc;
        if (canMove(player.row, player.col, nr, nc)) {
          player.row = nr; player.col = nc;
          player.targetX = nc * CELL + CELL / 2;
          player.targetY = HUD_H + nr * CELL + CELL / 2;
          player.dir = tryDir;
          player.moving = true;
          player.pendingDir = null;
        } else if (tryDir !== heldDir && heldDir) {
          dc = heldDir==='right'?1 : heldDir==='left'?-1 : 0;
          dr = heldDir==='down' ?1 : heldDir==='up'  ?-1 : 0;
          nr = player.row + dr; nc = player.col + dc;
          if (canMove(player.row, player.col, nr, nc)) {
            player.row = nr; player.col = nc;
            player.targetX = nc * CELL + CELL / 2;
            player.targetY = HUD_H + nr * CELL + CELL / 2;
            player.dir = heldDir;
            player.moving = true;
            player.pendingDir = null;
          }
        }
      }
    }

    if (player.moving) {
      let dx = player.targetX - player.x;
      let dy = player.targetY - player.y;
      let dist = Math.sqrt(dx*dx + dy*dy);
      if (dist <= PLAYER_SPEED) {
        player.x = player.targetX;
        player.y = player.targetY;
        player.moving = false;
      } else {
        player.x += (dx / dist) * PLAYER_SPEED;
        player.y += (dy / dist) * PLAYER_SPEED;
      }
    }
  }

  function drawPlayer() {
    if (player.invincible && !player.blinkOn) return;
    let lv  = LEVELS[level].char;
    let key = `char${lv}${player.dir}`;
    let sz  = CELL - 4;
    let alpha = player.invincible ? 0.6 : 1.0;
    if (!drawRaw(p, key, player.x, player.y, sz, sz, alpha)) {
      drawCharFallback(player.x, player.y, sz, player.dir, level, alpha);
    }
  }

  function drawCharFallback(x, y, sz, dir, lv, alpha) {
    let cols=['#f7c948','#64d2a4','#6ec1e4','#e87ea1','#ff9966','#b07cdb'];
    let c=cols[lv%cols.length];
    let r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
    let a=Math.round((alpha!==undefined?alpha:1)*255);
    p.fill(r,g,b,a); p.noStroke(); p.ellipse(x,y,sz*0.85,sz*0.85);
    let ex=dir==='left'?-1:dir==='right'?1:0;
    let ey=dir==='up'?-1:dir==='down'?1:0;
    p.fill(30,30,30,a);
    p.ellipse(x+ex*4-3,y+ey*4-3,5,5);
    p.ellipse(x+ex*4+3,y+ey*4-3,5,5);
  }

  // ============================================================
  // MOVEMENT CHECK
  // ============================================================
  function canMove(r,c,nr,nc){
    if(nr<0||nr>=ROWS||nc<0||nc>=COLS)return false;
    let dc=nc-c,dr=nr-r;
    if(dc=== 1)return !maze[r][c].right;
    if(dc===-1)return !maze[r][nc].right;
    if(dr=== 1)return !maze[r][c].down;
    if(dr===-1)return !maze[nr][c].down;
    return false;
  }

  // ============================================================
  // ITEMS
  // ============================================================
  function initItems(){
    return shuffledCells().slice(0,LEVELS[level].items).map(([r,c],i)=>({
      row:r,col:c,x:c*CELL+CELL/2,y:HUD_H+r*CELL+CELL/2,
      collected:false,bounce:Math.random()*Math.PI*2,index:i,
    }));
  }

  function drawItems(){
    let lv=LEVELS[level].char;
    items.forEach((it,i)=>{
      if(it.collected)return;
      let bob=Math.sin(p.frameCount*0.05+it.bounce)*3;
      let key=`item${lv}${String.fromCharCode(97+i)}`,sz=CELL-8;
      if(!drawRaw(p,key,it.x,it.y+bob,sz,sz)){
        let col=ITEM_COLORS[i%ITEM_COLORS.length];
        p.fill(parseInt(col.slice(1,3),16),parseInt(col.slice(3,5),16),parseInt(col.slice(5,7),16));
        p.noStroke(); p.rect(it.x-sz/2,it.y+bob-sz/2,sz,sz,4);
        p.fill(255,255,255,180); p.textSize(12*FONT_SCALE);
        p.text(String.fromCharCode(65+i),it.x,it.y+bob);
      }
    });
  }

  function checkItemCollection(){
    items.forEach((it,i)=>{
      if(!it.collected&&it.row===player.row&&it.col===player.col){
        it.collected=true;
        Audio.collectItem(i);
        // Add to HUD collected items with pop animation
        collectedHUDItems.push({
          index: i,
          key: `item${LEVELS[level].char}${String.fromCharCode(97+i)}`,
          color: ITEM_COLORS[i % ITEM_COLORS.length],
          popAnim: 12, // frames of pop animation remaining
        });
      }
    });
    // Tick down pop animations
    collectedHUDItems.forEach(h => { if (h.popAnim > 0) h.popAnim--; });
  }

  // ============================================================
  // APARTMENT
  // ============================================================
  function initApartment(){
    let[r,c]=shuffledCells().find(([r,c])=>Math.abs(r-player.row)+Math.abs(c-player.col)>5)||[ROWS-1,COLS-1];
    return{row:r,col:c,x:c*CELL+CELL/2,y:HUD_H+r*CELL+CELL/2,
           targetX:c*CELL+CELL/2,targetY:HUD_H+r*CELL+CELL/2,timer:0,moveInterval:22};
  }

  function updateApartment(){
    apartment.timer++;
    if(apartment.timer>=apartment.moveInterval){
      apartment.timer=0;
      for(let[dr,dc]of shuffle([[0,1],[0,-1],[1,0],[-1,0]])){
        let nr=apartment.row+dr,nc=apartment.col+dc;
        if(canMove(apartment.row,apartment.col,nr,nc)){
          apartment.row=nr;apartment.col=nc;
          apartment.targetX=nc*CELL+CELL/2;
          apartment.targetY=HUD_H+nr*CELL+CELL/2;
          break;
        }
      }
    }
    apartment.x=lerp(apartment.x,apartment.targetX,0.15);
    apartment.y=lerp(apartment.y,apartment.targetY,0.15);
    if(apartment.row===player.row&&apartment.col===player.col){
      phase6='items';
      items=initItems();
      collectedHUDItems=[];
      initCocktails();
      Audio.apartmentCatch();
    }
  }

  function drawApartment(){
    let bob=Math.sin(p.frameCount*0.06)*4,sz=CELL-4;
    if(!drawRaw(p,'apartment',apartment.x,apartment.y+bob,sz,sz)){
      p.fill(200,160,100);p.noStroke();
      p.rect(apartment.x-sz/2,apartment.y+bob-sz/2,sz,sz,4);
      p.fill(60,100,160);
      p.rect(apartment.x-sz/4,apartment.y+bob-sz/4,sz/2,sz/2,2);
      p.fill(255);p.textSize(10*FONT_SCALE);p.text('APT',apartment.x,apartment.y+bob);
    }
    p.fill(255,220,50);p.noStroke();p.textSize(7*FONT_SCALE);
    p.text('CATCH ME!',apartment.x,apartment.y-CELL/2-4);
  }

  // ============================================================
  // COCKTAILS
  // ============================================================
  function initCocktails(){
    cocktails=[0,1,2].map(i=>{
      let[r,c]=shuffledCells().find(([r,c])=>Math.abs(r-player.row)+Math.abs(c-player.col)>4)||[ROWS-1,COLS-1];
      return{row:r,col:c,x:c*CELL+CELL/2,y:HUD_H+r*CELL+CELL/2,
             targetX:c*CELL+CELL/2,targetY:HUD_H+r*CELL+CELL/2,
             timer:0,moveInterval:35+i*10,
             imgKey:`cocktail${i+1}`,color:COCKTAIL_COLORS[i],hitCooldown:0};
    });
  }

  function updateCocktails(){
    cocktails.forEach(ck=>{
      ck.hitCooldown=Math.max(0,ck.hitCooldown-1);
      ck.timer++;
      if(ck.timer>=ck.moveInterval){
        ck.timer=0;
        let best=null,bestDist=Infinity;
        for(let[dr,dc]of shuffle([[0,1],[0,-1],[1,0],[-1,0]])){
          let nr=ck.row+dr,nc=ck.col+dc;
          if(canMove(ck.row,ck.col,nr,nc)){
            let d=Math.abs(nr-player.row)+Math.abs(nc-player.col);
            if(d<bestDist){bestDist=d;best=[nr,nc];}
          }
        }
        if(best){[ck.row,ck.col]=best;ck.targetX=ck.col*CELL+CELL/2;ck.targetY=HUD_H+ck.row*CELL+CELL/2;}
      }
      ck.x=lerp(ck.x,ck.targetX,0.15);
      ck.y=lerp(ck.y,ck.targetY,0.15);
    });
  }

  function drawCocktails(){
    cocktails.forEach(ck=>{
      let bob=Math.sin(p.frameCount*0.07+ck.timer)*3,sz=CELL-6;
      if(!drawRaw(p,ck.imgKey,ck.x,ck.y+bob,sz,sz)){
        let c=ck.color;
        p.fill(parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16));
        p.noStroke();p.ellipse(ck.x,ck.y+bob,sz,sz);
        p.fill(255);p.textSize(11*FONT_SCALE);p.text('$25',ck.x,ck.y+bob);
      }
    });
  }

  function checkCocktailCollision(){
    if(player.invincible)return;
    cocktails.forEach(ck=>{
      if(ck.hitCooldown>0)return;
      if(ck.row===player.row&&ck.col===player.col){
        lives--;
        ck.hitCooldown=180;
        heartAnim={index:lives,timer:0,phase:'pulse',pulseDuration:30,blinkDuration:60};
        Audio.lifeHit();
        resetPlayerToStart();
        if(lives<=0){
          setTimeout(()=>{Audio.gameOver();state='gameOver';},500);
        }
      }
    });
  }

  // ============================================================
  // HUD
  // ============================================================
  function drawHUD(){
    p.fill(15,15,25);p.noStroke();p.rect(0,0,CANVAS_W,HUD_H);
    p.fill(255,255,255,8);
    for(let y=0;y<HUD_H;y+=4)p.rect(0,y,CANVAS_W,2);

    // Level label (left side)
    p.fill(255,220,80);p.noStroke();p.textSize(8*FONT_SCALE);
    p.textAlign(p.LEFT,p.CENTER);
    p.text(`LVL ${level+1}`,10,HUD_H/2-8);
    p.fill(200,200,255);p.textSize(7*FONT_SCALE);
    p.text(LEVELS[level].label.toUpperCase(),10,HUD_H/2+8);
    p.textAlign(p.CENTER,p.CENTER);

    // ---- COLLECTED ITEMS DISPLAY (center HUD) ----
    let showItemsBar = !(level === 5 && phase6 === 'apartment');
    if (showItemsBar) {
      let total = LEVELS[level].items;
      let lv = LEVELS[level].char;
      let names = ITEM_NAMES[level] || [];

      // Each collected item slot
      let slotSz = 28;
      let gap = 4;
      let totalW = total * (slotSz + gap) - gap;
      let startX = CANVAS_W / 2 - totalW / 2;
      // Shift slots upward a bit to leave room for names
      let slotY = HUD_H / 2 - 8;

      for (let i = 0; i < total; i++) {
        let cx = startX + i * (slotSz + gap) + slotSz / 2;
        let cy = slotY;
        let isCollected = i < collectedHUDItems.length;
        let hudItem = collectedHUDItems[i];

        // Pop scale
        let scl = 1.0;
        if (isCollected && hudItem && hudItem.popAnim > 0) {
          let t = 1 - (hudItem.popAnim / 12);
          scl = 1 + 0.4 * Math.sin(t * Math.PI);
        }

        let sz = slotSz * scl;

        // Slot background
        p.fill(30, 30, 50);
        p.noStroke();
        p.rect(cx - slotSz/2 - 1, cy - slotSz/2 - 1, slotSz + 2, slotSz + 2, 3);

        if (isCollected && hudItem) {
          // Draw item image or colored fallback
          let key = hudItem.key;
          let col = hudItem.color;
          if (!drawRaw(p, key, cx, cy, sz, sz)) {
            let r = parseInt(col.slice(1,3),16);
            let g2 = parseInt(col.slice(3,5),16);
            let b = parseInt(col.slice(5,7),16);
            p.fill(r, g2, b);
            p.noStroke();
            p.rect(cx - sz/2, cy - sz/2, sz, sz, 3);
            p.fill(255, 255, 255, 200);
            p.textSize(8 * FONT_SCALE);
            p.text(String.fromCharCode(65 + i), cx, cy);
          }
          // Shine overlay
          p.fill(255, 255, 255, 40);
          p.noStroke();
          p.rect(cx - slotSz/2, cy - slotSz/2, slotSz, slotSz/3, 3);
        } else {
          // Empty slot — dim dashed border hint
          p.stroke(60, 60, 80);
          p.strokeWeight(1);
          p.noFill();
          p.rect(cx - slotSz/2, cy - slotSz/2, slotSz, slotSz, 3);
          p.noStroke();
          p.fill(40, 40, 60, 180);
          p.textSize(7 * FONT_SCALE);
          p.text('?', cx, cy);
        }

        // Name label below slot (only if a non-empty name is defined)
        let itemName = names[i];
        if (itemName && itemName.length > 0) {
          p.noStroke();
          p.fill(isCollected ? p.color(255, 220, 80) : p.color(120, 120, 150));
          p.textSize(5 * FONT_SCALE);
          p.textAlign(p.CENTER, p.TOP);
          p.text(itemName.toUpperCase(), cx, cy + slotSz / 2 + 3);
          p.textAlign(p.CENTER, p.CENTER);
        }
      }
    }

    // NYC apartment phase hint
    if(level===5){
      p.fill(255,180,50);p.textSize(6*FONT_SCALE);p.textAlign(p.CENTER,p.CENTER);
      let hintY = showItemsBar ? (HUD_H/2 + 26) : HUD_H/2;
      p.text(phase6==='apartment'?'> FIND THE APARTMENT <':'> DODGE THE $25 COCKTAILS <',CANVAS_W/2,hintY);

      // Hearts (right side)
      let baseSize=18,startX=CANVAS_W-14,heartY=HUD_H/2;
      if(heartAnim)heartAnim.timer++;

      for(let i=0;i<3;i++){
        let hx=startX-i*(baseSize+4),sz=baseSize,heartAlpha=1.0;
        let isAnimatingHeart=heartAnim&&heartAnim.index===i;
        if(isAnimatingHeart){
          let t=heartAnim.timer;
          if(heartAnim.phase==='pulse'){
            let progress=t/heartAnim.pulseDuration;
            let scale=1+0.8*Math.sin(progress*Math.PI);
            sz=baseSize*scale;
            if(t>=heartAnim.pulseDuration){heartAnim.phase='blink';heartAnim.timer=0;}
          } else if(heartAnim.phase==='blink'){
            let t2=heartAnim.timer;
            let blinkVis=Math.floor(t2/6)%2===0;
            heartAlpha=blinkVis?Math.max(0,1-t2/heartAnim.blinkDuration):0;
            if(t2>=heartAnim.blinkDuration){heartAnim=null;heartAlpha=0;sz=0;}
          }
        }
        let isAlive=i<lives;
        if(!isAlive&&!isAnimatingHeart)continue;
        if(sz<=0)continue;
        let isFilledHeart=isAlive||isAnimatingHeart;
        p.drawingContext.save();
        p.drawingContext.globalAlpha=heartAlpha;
        if(rawImgs['heart']&&isFilledHeart){
          p.drawingContext.drawImage(rawImgs['heart'],hx-sz/2,heartY-sz/2,sz,sz);
        } else {
          p.fill(isFilledHeart?p.color(232,25,44):p.color(60,60,80));
          p.noStroke(); drawHeartShape(hx,heartY,sz);
        }
        p.drawingContext.restore();
      }
    }
    p.textAlign(p.CENTER,p.CENTER);
  }

  function drawHeartShape(x,y,sz){
    let s=sz/20;p.beginShape();
    p.vertex(x,y+4*s);
    p.bezierVertex(x-10*s,y-4*s,x-20*s,y+2*s,x,y+14*s);
    p.bezierVertex(x+20*s,y+2*s,x+10*s,y-4*s,x,y+4*s);
    p.endShape(p.CLOSE);
  }

  // ============================================================
  // MOUSE
  // ============================================================
  p.mousePressed = function(){
    let mx=p.mouseX, my=p.mouseY;

    if (state === 'menu') {
      if (hitButton(mx, my, CANVAS_W/2, CANVAS_H-80, 180, 46)) {
        Audio.menuClick(); startLevel(0);
      }
    }
    if (state === 'levelClear') {
      if (hitButton(mx, my, CANVAS_W/2, CANVAS_H-80, 220, 46)) {
        Audio.menuClick(); startLevel(level+1);
      }
    }
    if (state === 'gameOver' || state === 'win') {
      if (hitButton(mx, my, CANVAS_W/2, CANVAS_H-80, 180, 46)) {
        Audio.menuClick(); level=0; state='menu';
      }
    }
  };

  // ============================================================
  // START LEVEL
  // ============================================================
  function startLevel(lv){
    level = lv;
    maze = buildMaze();
    player = initPlayer();
    items = initItems();
    collectedHUDItems = [];
    lives = 3;
    phase6 = 'apartment';
    heartAnim = null;
    Audio.levelStart();

    // Always show level intro screen first
    introTimer = 0;
    state = 'intro';

    if (LEVELS[lv].extra) {
      apartment = initApartment();
      items = [];
      // Warning screen is shown after intro completes
    }
  }

  // ============================================================
  // UTILS
  // ============================================================
  function shuffledCells(){
    let cells=[];
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++)
      if(!(r===0&&c===0))cells.push([r,c]);
    return shuffle(cells);
  }
  function shuffle(arr){
    let a=[...arr];
    for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
    return a;
  }
  function lerp(a,b,t){return a+(b-a)*t;}
  function lerpColorHex(h1,h2,t){
    let parse=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
    let[r1,g1,b1]=parse(h1),[r2,g2,b2]=parse(h2);
    return[Math.round(r1+(r2-r1)*t),Math.round(g1+(g2-g1)*t),Math.round(b1+(b2-b1)*t)];
  }
  function drawStar(x,y,r1,r2,pts){
    p.beginShape();
    for(let i=0;i<pts*2;i++){
      let a=(Math.PI/pts)*i-Math.PI/2,r=i%2===0?r1:r2;
      p.vertex(x+Math.cos(a)*r,y+Math.sin(a)*r);
    }
    p.endShape(p.CLOSE);
  }

}); // end p5
</script>
